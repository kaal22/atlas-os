[General]
DisplayServer=x11
GreeterEnvironment=QT_QPA_PLATFORM=xcb
Numlock=on
# Atlas defaults to X11 for NVIDIA / Ollama / Calamares compatibility.
# Wayland Plasma sessions are disabled by atlas-x11-default hook.

[Theme]
Current=breeze
CursorTheme=breeze_cursors

[Users]
MaximumUid=60000
# Prefer the X11 Plasma session (xsessions/plasma.desktop), not plasmawayland
DefaultSession=plasma.desktop

[Autologin]
Session=plasma.desktop

[X11]
ServerPath=/usr/bin/X
SessionCommand=/etc/sddm/Xsession
DisplayCommand=/etc/sddm/Xsetup
EnableHiDPI=true
