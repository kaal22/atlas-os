---
# Calamares settings for Atlas OS (Debian live installer flow + Atlas branding)
modules-search: [ local, /usr/lib/calamares/modules ]

instances:

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      # Install grub-pc or grub-efi-amd64 into the TARGET (offline-safe helper)
      - bootloader-config
      - grubcfg
      - bootloader
      - packages
      - initramfscfg
      - initramfs
      - umount
  - show:
      - finished

branding: atlas
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
hide-finished-banner: false
