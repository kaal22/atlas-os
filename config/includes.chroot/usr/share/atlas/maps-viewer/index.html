<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas Maps</title>
  <style>
    /* Full-viewport paint surface: solid sky so blank vs tiles is obvious. */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #0b6e99;
      overflow: hidden;
    }
    #app, #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #0b6e99;
    }
  </style>
  <!-- Absolute /maps/ paths so /maps (no trailing slash) still resolves scripts correctly after redirect. -->
  <link rel="stylesheet" href="/maps/lib/maplibre-gl.css" />
</head>
<body>
  <div id="app"><div id="map">Loading Atlas Maps…</div></div>
  <script src="/maps/lib/maplibre-gl.js"></script>
  <script src="/maps/lib/pmtiles.js"></script>
  <script src="/maps/lib/basemaps.js"></script>
  <script src="/maps/lib/atlas-maps-app.js"></script>
  <script>
(function () {
  var app = document.getElementById("app");
  function fail(e) {
    var msg = String(e && e.message ? e.message : e);
    app.innerHTML =
      '<div style="padding:1.5rem;color:#fecaca;font:15px/1.45 system-ui,sans-serif;background:#0f1419;min-height:100%">' +
      "<strong>Maps failed to start</strong><p style=\"color:#9aa8b5\">" +
      msg.replace(/[<>&]/g, function (c) {
        return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c];
      }) +
      "</p><p style=\"color:#9aa8b5\">Open on Command Centre port <strong>8787</strong> " +
      "(e.g. <code>http://127.0.0.1:8787/maps/?country=uk&amp;debug=1</code>). " +
      "WebGL Alpha-premult / y-flip warnings are harmless. See <code>/maps/diag</code>.</p></div>";
  }
  if (!window.AtlasMaps || typeof AtlasMaps.mount !== "function") {
    fail(new Error("atlas-maps-app.js did not define AtlasMaps.mount"));
    return;
  }
  var origin = window.location.origin;
  var contentUrl = origin.includes(":8090") ? "http://127.0.0.1:8787/#/content" : origin + "/#/content";
  var catalogueUrl = origin.includes(":8090")
    ? "http://127.0.0.1:8787/api/content/catalogue"
    : origin + "/api/content/catalogue";
  AtlasMaps.mount(app, {
    contentUrl: contentUrl,
    catalogueUrl: catalogueUrl,
  }).catch(fail);
})();
  </script>
</body>
</html>
