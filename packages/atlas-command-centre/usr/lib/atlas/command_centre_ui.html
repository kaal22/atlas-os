<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Atlas Command Centre</title>
<style>
/* Atlas Command Centre — premium dark design system */
:root{
  --bg-0:#0a0b10;--bg-1:#10121a;--bg-2:#161925;
  --surface-0:#151822;--surface-1:#1b1f2c;--surface-2:#232836;--surface-3:#2b3142;
  --border:rgba(255,255,255,.12);--border-strong:rgba(255,255,255,.2);
  --primary:#6366f1;--primary-bright:#818cf8;--primary-dim:rgba(99,102,241,.16);
  --cyan:#38bdf8;--cyan-dim:rgba(56,189,248,.12);
  --success:#34d399;--success-dim:rgba(52,211,153,.14);
  --warn:#fbbf24;--warn-dim:rgba(251,191,36,.12);
  --danger:#f87171;--danger-dim:rgba(248,113,113,.12);
  --text:#f4f4f5;--text-2:#b8bac3;--text-3:#8b8f9a;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.35);
  --shadow-md:0 8px 24px rgba(0,0,0,.4);
  --shadow-glow:0 0 40px rgba(99,102,241,.08);
  --font:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,"Cascadia Code","SF Mono",monospace;
  --ease:cubic-bezier(.4,0,.2,1);
  /* legacy aliases */
  --bg:var(--bg-0);--bg-subtle:var(--bg-1);--panel:var(--surface-0);--panel-elevated:var(--surface-2);
  --accent:var(--primary-bright);--accent-bright:var(--text);--accent-dim:var(--primary-dim);--accent-glow:rgba(99,102,241,.06);
  --muted:var(--text-2);
}
*{box-sizing:border-box}
body{
  margin:0;font-family:var(--font);color:var(--text);min-height:100vh;
  background:
    radial-gradient(ellipse 90% 60% at 10% -10%,rgba(99,102,241,.09),transparent 50%),
    radial-gradient(ellipse 60% 40% at 100% 0%,rgba(56,189,248,.06),transparent 45%),
    var(--bg-0);
  -webkit-font-smoothing:antialiased;
}
a{color:var(--primary-bright);text-decoration:none;transition:color .15s var(--ease)}
a:hover{color:#fff}
.hidden{display:none!important}

/* Shell */
.shell{display:flex;min-height:100vh;height:100vh}
.sidebar{
  width:252px;flex-shrink:0;display:flex;flex-direction:column;
  background:linear-gradient(180deg,var(--surface-1) 0%,var(--bg-1) 100%);
  border-right:1px solid var(--border-strong);padding:1.25rem .85rem;
}
.sidebar-brand{display:flex;align-items:center;gap:.65rem;padding:.25rem .65rem 1.25rem;margin-bottom:.5rem}
.sidebar-brand .mark,.auth-brand .mark{
  width:34px;height:34px;object-fit:contain;flex-shrink:0;display:block;
  filter:drop-shadow(0 0 12px rgba(120,160,255,.4));
}
.sidebar-brand .wordmark{font-size:.72rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);line-height:1.2}
.sidebar-brand .wordmark strong{display:block;font-size:.95rem;letter-spacing:.06em;color:var(--text);font-weight:600;text-transform:none}
.nav-section{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);padding:.75rem .65rem .35rem}
.nav-item{
  display:flex;align-items:center;gap:.65rem;width:100%;text-align:left;
  background:transparent;border:0;color:var(--text-2);padding:.55rem .65rem;
  cursor:pointer;font:inherit;font-size:.875rem;font-weight:500;border-radius:var(--radius-sm);
  transition:background .18s var(--ease),color .18s var(--ease),transform .18s var(--ease);
}
.nav-item svg{width:18px;height:18px;opacity:.75;flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text);transform:translateX(2px)}
.nav-item.active{
  background:var(--primary-dim);color:var(--text);
  box-shadow:inset 0 0 0 1px rgba(99,102,241,.25);
}
.nav-item.active svg{opacity:1;color:var(--primary-bright)}
.sidebar-foot{margin-top:auto;padding:.75rem .65rem 0;border-top:1px solid var(--border-strong);font-size:.75rem;color:var(--text-3)}
.shell-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.topbar{
  height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:0 1.75rem;border-bottom:1px solid var(--border-strong);
  background:rgba(16,18,26,.88);backdrop-filter:blur(16px);position:sticky;top:0;z-index:20;
}
.topbar-left{display:flex;flex-direction:column;gap:.1rem;min-width:0}
.topbar-title{font-size:1.05rem;font-weight:600;letter-spacing:-.02em;color:var(--text);margin:0}
.topbar-sub{font-size:.8125rem;color:var(--text-3);margin:0}
.topbar-right{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.content{flex:1;padding:1.5rem 1.75rem 2.5rem;overflow-y:auto;animation:fadeIn .25s var(--ease);min-height:0}
.content.chat-page{display:flex;flex-direction:column;overflow:hidden;padding:.75rem 1.25rem 1rem}
.content.maps-page{display:flex;flex-direction:column;overflow:hidden;padding:.75rem 1.25rem 1rem;flex:1;min-height:0;height:100%}
.maps-page-shell{display:flex;flex-direction:column;flex:1;min-height:0;gap:.5rem;height:100%}
.maps-toolbar{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;flex-shrink:0}
.maps-toolbar .maps-hint{margin:0;font-size:.8rem;color:var(--text-3);flex:1;min-width:12rem}
/* In-page MapLibre host — explicit px floor so flex layouts cannot collapse the WebGL canvas. */
.maps-frame-wrap{position:relative;display:block;flex:1 1 auto;min-height:560px;height:min(70vh,720px);width:100%;border:1px solid var(--border-strong);border-radius:var(--radius);background:#0f1419;overflow:hidden}
.maps-frame-wrap .atlas-maps-host{min-height:560px!important;height:100%!important;width:100%!important}
.maps-frame-wrap .maplibregl-map,.maps-frame-wrap .maplibregl-canvas{width:100%!important;min-height:480px!important}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Typography */
h1.page-title{font-size:1.5rem;font-weight:600;margin:0 0 .35rem;letter-spacing:-.02em}
h2.section-head{font-size:.75rem;font-weight:650;margin:0 0 .85rem;color:var(--text-2);text-transform:uppercase;letter-spacing:.1em}
.page-intro{margin:0 0 1.5rem;color:var(--text-2);line-height:1.6;max-width:40rem;font-size:.9rem}
p,li{color:var(--text-2);line-height:1.55}
.section-title{font-size:.75rem;font-weight:650;margin:1.75rem 0 .85rem;color:var(--text-2);text-transform:uppercase;letter-spacing:.1em}
.section-block{
  margin-bottom:1.5rem;padding:1.15rem 1.2rem 1.25rem;
  border:1px solid var(--border);border-radius:var(--radius-lg);
  background:rgba(255,255,255,.02);
}
.section-block .section-head-row,.section-block > h2.section-head{margin-bottom:.9rem}
.section-head-row{display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;margin-bottom:.85rem;padding-bottom:.65rem;border-bottom:1px solid var(--border)}
.section-head-row h2{margin:0;color:var(--text-2)}
.section-head-row p{margin:0;font-size:.8125rem;color:var(--text-3)}
.grid-2.section-block{padding:1.15rem 1.2rem}

/* Buttons & inputs */
input,textarea,select{
  width:100%;background:var(--bg-1);border:1px solid var(--border-strong);
  color:var(--text);padding:.65rem .85rem;margin:.35rem 0 .75rem;font:inherit;
  border-radius:var(--radius-sm);transition:border-color .15s,box-shadow .15s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:rgba(99,102,241,.45);box-shadow:0 0 0 3px var(--primary-dim)}
button:focus-visible{outline:2px solid var(--primary-bright);outline-offset:2px}
textarea{min-height:100px;resize:vertical}
.btn{
  background:linear-gradient(180deg,var(--primary-bright) 0%,var(--primary) 100%);
  color:#fff;border:0;padding:.6rem 1.1rem;cursor:pointer;font-weight:600;
  border-radius:var(--radius-sm);font-family:var(--font);font-size:.875rem;
  box-shadow:0 2px 8px rgba(99,102,241,.25);
  transition:transform .15s var(--ease),box-shadow .15s var(--ease),opacity .15s;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.35)}
.btn:active{transform:translateY(0)}
.btn.secondary{background:transparent;color:var(--text);border:1px solid var(--border-strong);box-shadow:none;margin-left:.5rem}
.btn.secondary:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.16);transform:none}
.btn.ghost{background:transparent;color:var(--text-2);border:1px solid var(--border);box-shadow:none;padding:.45rem .75rem;font-size:.8125rem}
.btn.danger{background:transparent;color:var(--danger);border:1px solid rgba(248,113,113,.35);box-shadow:none}
.btn-group{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.btn-group .btn,.btn-group .btn.secondary{margin-left:0}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.text-danger{color:var(--danger)}.text-warn{color:var(--warn)}

/* Chips */
.chip,.pill-sm{
  display:inline-flex;align-items:center;gap:.35rem;font-size:.6875rem;font-weight:600;
  padding:.25rem .55rem;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;
}
.chip-ok,.pill-sm.ok{background:var(--success-dim);color:var(--success)}
.chip-bad,.pill-sm.bad{background:var(--danger-dim);color:var(--danger)}
.chip-warn,.pill-sm.wait{background:var(--warn-dim);color:var(--warn)}
.chip-neutral{background:rgba(255,255,255,.06);color:var(--text-2)}
.chip-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* Cards */
.card,.panel{
  border:1px solid var(--border-strong);background:var(--surface-1);
  padding:1.15rem 1.25rem;margin:.75rem 0;border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .2s;
}
.card-interactive{cursor:pointer}
.card-interactive:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(99,102,241,.35)}
.card h3{margin:0 0 .4rem;font-size:.95rem;color:var(--text);font-weight:600}
.card p{margin:.35rem 0;font-size:.875rem}
.card .tools{font-size:.8125rem;color:var(--text-3);font-family:var(--mono)}

/* Dashboard */
.hero{
  position:relative;border-radius:var(--radius-lg);padding:1.75rem 1.85rem;margin-bottom:1.5rem;
  border:1px solid var(--border-strong);
  background:linear-gradient(135deg,var(--surface-2) 0%,var(--surface-1) 55%,var(--bg-1) 100%);
  box-shadow:var(--shadow-glow);overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-40%;right:-15%;width:55%;height:180%;
  background:radial-gradient(circle,rgba(99,102,241,.18),transparent 65%);pointer-events:none;
}
.hero-inner{position:relative;z-index:1}
.hero-eyebrow{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--primary-bright);margin:0 0 .5rem}
.hero h1{font-size:1.65rem;font-weight:600;margin:0 0 .5rem;letter-spacing:-.03em}
.hero-desc{color:var(--text-2);font-size:.925rem;max-width:36rem;margin:0 0 1.15rem;line-height:1.55}
.hero-actions{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.hero-status{margin-top:1rem;display:flex;flex-wrap:wrap;gap:.5rem}

.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.75rem}
.action-tile{
  display:flex;flex-direction:column;gap:.45rem;padding:1rem;border-radius:var(--radius);
  border:1px solid var(--border-strong);background:var(--surface-1);cursor:pointer;text-decoration:none!important;
  transition:transform .2s var(--ease),box-shadow .2s,border-color .2s;
}
.action-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:rgba(99,102,241,.35)}
.action-tile .ico{
  width:36px;height:36px;border-radius:10px;display:grid;place-items:center;
  background:var(--primary-dim);color:var(--primary-bright);font-size:1rem;
}
.action-tile strong{font-size:.875rem;color:var(--text);font-weight:600}
.action-tile span{font-size:.75rem;color:var(--text-3);line-height:1.35}

.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.75rem}
.metric-card{
  padding:1rem 1.05rem;border-radius:var(--radius);border:1px solid var(--border-strong);
  background:var(--surface-1);transition:transform .2s,border-color .2s;
}
.metric-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.22)}
.metric-card .label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:.45rem}
.metric-card .value{font-size:1.25rem;font-weight:600;color:var(--text);letter-spacing:-.02em}
.metric-card .meta{font-size:.75rem;color:var(--text-3);margin-top:.25rem}

.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem}
.service-card{
  padding:1rem;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface-1);
  display:flex;flex-direction:column;gap:.5rem;
}
.service-card-head{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.service-card strong{font-size:.875rem;color:var(--text)}
.service-card p{margin:0;font-size:.75rem;color:var(--text-3);line-height:1.4}
.service-card .svc-url{font-family:var(--mono);font-size:.68rem;color:var(--text-3)}

.activity-list{display:flex;flex-direction:column;gap:0}
.activity-row{
  display:flex;justify-content:space-between;gap:1rem;padding:.7rem 0;
  border-bottom:1px solid var(--border);font-size:.8125rem;
}
.activity-row:last-child{border-bottom:0}
.activity-row .when{color:var(--text-3);white-space:nowrap}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:960px){
  .sidebar{width:72px;padding:1rem .5rem}
  .sidebar .nav-item span,.sidebar-brand .wordmark,.nav-section,.sidebar-foot{display:none}
  .sidebar-brand{justify-content:center;padding:.25rem 0 1rem}
  .nav-item{justify-content:center;padding:.65rem}
}
@media(max-width:760px){
  .shell{flex-direction:column;height:auto;min-height:100vh}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:.75rem}
  .sidebar-brand{padding:0 .5rem}
  .shell-main .topbar{padding:0 1rem}
  .content{padding:1rem}
  .grid-2{grid-template-columns:1fr}
}

/* Existing feature styles (chat, tables, etc.) */
.pre{white-space:pre-wrap;background:var(--bg-1);padding:.75rem;font-family:var(--mono);font-size:.8125rem;color:var(--text);border-radius:var(--radius-sm);border:1px solid var(--border)}
.download-panel{border:1px solid var(--border);background:var(--surface-1);padding:1rem 1.25rem;margin:1rem 0;border-radius:var(--radius)}
.download-panel h2{margin:0 0 .75rem;font-size:.875rem;color:var(--text);font-weight:600}
.progress-track{height:6px;background:var(--bg-0);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--cyan));width:0%;transition:width .35s ease;border-radius:999px}
.progress-fill.is-indeterminate{
  width:42% !important;
  animation:contentFetchSlide 1.35s ease-in-out infinite alternate;
}
.spinner[hidden],.content-fetch-check[hidden]{display:none!important;animation:none!important}
.content-fetch-check{
  display:inline-flex;align-items:center;justify-content:center;
  width:1rem;height:1rem;margin-right:.35rem;flex-shrink:0;
  color:var(--success);font-weight:700;font-size:.95rem;line-height:1;
}
@keyframes contentFetchSlide{
  0%{transform:translateX(0);opacity:.85}
  100%{transform:translateX(130%);opacity:1}
}
.content-fetch-panel{
  margin:0 0 1rem;padding:1rem 1.15rem;
  position:sticky;top:0;z-index:6;
  background:var(--surface-1);
  box-shadow:0 8px 24px rgba(0,0,0,.28);
  border:1px solid rgba(56,189,248,.35);
}
.content-fetch-panel h3{margin:0 0 .65rem;font-size:.95rem;display:flex;align-items:center;gap:.45rem}
.content-fetch-panel .progress-track{height:10px;margin:.35rem 0 .55rem;background:rgba(255,255,255,.06)}
.content-fetch-stats{font-size:.8125rem;color:var(--text-2);font-family:var(--mono);margin:.25rem 0}
.content-fetch-msg{font-size:.85rem;color:var(--text-3);margin:.35rem 0 0;line-height:1.4}
.content-fetch-panel.is-error{border-color:rgba(248,113,113,.45)}
.content-fetch-panel.is-cancelled{border-color:rgba(251,191,36,.45)}
.content-fetch-panel.is-ok{border-color:rgba(52,211,153,.45)}
.content-fetch-panel.is-busy{border-color:rgba(56,189,248,.4)}
.content-fetch-panel[hidden],.content-fetch-panel.is-hidden{display:none !important}
.viewer-frame-wrap{margin:.75rem 0 0;border:1px solid var(--border-strong);border-radius:var(--radius);overflow:hidden;background:#0a0b10}
.viewer-frame{display:block;width:100%;height:min(68vh,720px);border:0;background:#0a0b10}
.feature-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem;margin:1rem 0}
.feature-card{border:1px solid var(--border);background:var(--surface-1);border-radius:var(--radius);padding:1rem 1.05rem}
.feature-card h3{margin:0 0 .35rem;font-size:.9rem}
.feature-card p{margin:0 0 .75rem;font-size:.8125rem;color:var(--text-2);line-height:1.45}
.feature-card .meta{font-size:.75rem;color:var(--text-3);margin-bottom:.65rem}
.powered-by{font-size:.75rem;color:var(--text-3);margin:.35rem 0 0}
.wizard-wrap{max-width:40rem}
.wizard-steps{display:flex;flex-wrap:wrap;gap:.35rem;margin:0 0 1rem;padding:0;list-style:none}
.wizard-steps li{
  font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--text-3);padding:.25rem .5rem;border-radius:999px;border:1px solid transparent;
}
.wizard-steps li.done{color:var(--success)}
.wizard-steps li.current{color:var(--text);border-color:rgba(99,102,241,.35);background:var(--primary-dim)}
.wizard-panel{margin:1rem 0 1.25rem}
.wizard-panel h2{margin:0 0 .5rem;font-size:1.25rem;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.wizard-panel > p{margin:0 0 1rem;color:var(--text-2);line-height:1.55}
.wizard-nav{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-top:1.25rem}
.wizard-nav .spacer{flex:1}
.wiz-choice{
  display:block;width:100%;text-align:left;margin:.4rem 0;padding:.85rem 1rem;
  border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-1);
  color:inherit;font:inherit;cursor:pointer;transition:border-color .15s,background .15s;
}
.wiz-choice:hover{border-color:var(--border-strong);background:var(--surface-2)}
.wiz-choice.selected{border-color:rgba(99,102,241,.45);background:var(--primary-dim)}
.wiz-choice strong{display:block;color:var(--text);font-size:.9rem}
.wiz-choice span{display:block;margin-top:.25rem;font-size:.8125rem;color:var(--text-3);line-height:1.4}
.wiz-pack-row{
  display:flex;justify-content:space-between;align-items:center;gap:1rem;
  padding:.75rem 0;border-bottom:1px solid var(--border);
}
.wiz-pack-row:last-child{border-bottom:0}
.download-msg{font-size:.8125rem;color:var(--text-3);margin-top:.35rem;font-family:var(--mono)}
.spinner{display:inline-block;width:1rem;height:1rem;border:2px solid var(--border);border-top-color:var(--primary-bright);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.35rem}
@keyframes spin{to{transform:rotate(360deg)}}
.chat-page-shell{display:flex;flex-direction:column;flex:1;min-height:0;gap:.5rem}
.chat-toolbar{flex-shrink:0;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.chat-toolbar select{margin:0;flex:1;min-width:160px}
.chat-toolbar .btn,.chat-toolbar .btn.secondary{margin:0}
.chat-intro{margin:0;font-size:.8125rem;color:var(--text-3);flex:1 1 100%}
.chat-wrap{display:flex;flex-direction:column;flex:1;min-height:0;border:1px solid var(--border-strong);background:var(--bg-1);border-radius:var(--radius);overflow:hidden}
.chat-layout{display:grid;grid-template-columns:220px minmax(0,1fr);gap:.75rem;flex:1;min-height:0;margin:0}
.chat-threads-panel{
  border:1px solid var(--border-strong);background:var(--surface-1);border-radius:var(--radius);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;height:100%;
}
.chat-threads-head{
  padding:.7rem .8rem;border-bottom:1px solid var(--border-strong);font-size:.68rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.1em;color:var(--text-2);flex-shrink:0;
}
.chat-threads-list{flex:1;overflow-y:auto;padding:.35rem}
.chat-thread-item{
  display:flex;align-items:flex-start;gap:.2rem;width:100%;
  padding:.15rem;border-radius:var(--radius-sm);transition:background .15s var(--ease);
}
.chat-thread-item:hover{background:rgba(255,255,255,.04)}

      html+=`<div class="nav-section">${escapeHtml(n.section)}</div>`;
      lastSection=n.section;
    }
    html+=`<button type="button" class="nav-item ${active===n.id?'active':''}" onclick="location.hash='#/${n.id}'">${n.icon}<span>${escapeHtml(n.label)}</span></button>`;

function renderTopbar(id,extras){
  extras=extras||{};
  const meta=PAGE_META[id]||{title:id,sub:''};
  const bar=document.getElementById('topbar');
  if(!bar) return;

    :extras.modelReady===false?chip('No model','bad'):'';
  const sysChip=extras.sysOk===true?chip('System OK','ok'):extras.sysOk===false?chip('Degraded','warn'):'';
  bar.innerHTML=`<div class="topbar-left">

      <button type="button" class="btn ghost" id="logoutLink">Sign out</button>

async function ensureSession(){
  setGateStatus('Checking device…');
  const bootResp=await api('/api/auth/bootstrap');
  if(bootResp._status>=500 || bootResp.error==='bad_response'){
    showGateError('Could not reach the Command Centre API (HTTP '+(bootResp._status||'?')+').');
    return false;
  }
  if(bootResp.needs_bootstrap){
    showBootstrapGate('');
    return false;
  }
  const me=await api('/api/auth/session');
  if(me._status===401 || me.error==='unauthorized'){
    showLoginGate('');
    return false;
  }
  if(me._status>=400){
    showGateError(me.error||('Session check failed (HTTP '+me._status+')'));
    return false;
  }
  _sessionUser=me.username||'';
  hideAuth();
  authed=true;
  return true;
}

async function doLogout(){
  await api('/api/auth/logout',{method:'POST',body:'{}'});
  authed=false;
  boot();
}

async function loadKbBrowser(){

function formatContentBytes(n){
  n=Number(n)||0;
  if(n>=1e9) return (n/1e9).toFixed(2)+' GB';
  if(n>=1e6) return (n/1e6).toFixed(1)+' MB';
  if(n>=1e3) return (n/1e3).toFixed(0)+' KB';
  return n+' B';
}
function contentFetchPanelHtml(){

      <h3 id="contentFetchTitle"><span class="spinner" id="contentFetchSpinner" hidden></span><span class="content-fetch-check" id="contentFetchCheck" hidden aria-hidden="true">✓</span><span id="contentFetchTitleText">Download</span></h3>
      <div class="progress-track"><div id="contentFetchFill" class="progress-fill" style="width:0%"></div></div>
      <div id="contentFetchStats" class="content-fetch-stats"></div>
      <div id="contentFetchMsg" class="content-fetch-msg"></div>
      <div id="contentFetchActions" class="btn-group" style="margin-top:.75rem"></div>
    </div>
    <div id="contentMsg" style="margin-top:.75rem"></div>`;
}
function formatEta(sec){
  // Number(null)===0 would otherwise show "~1s left" whenever eta is cleared.
  if(sec==null||sec==='') return '';
  sec=Number(sec);
  if(!Number.isFinite(sec)||sec<=0) return '';
  if(sec<60) return '~'+Math.max(1,Math.round(sec))+'s left';
  if(sec<3600) return '~'+Math.round(sec/60)+' min left';
  return '~'+(sec/3600).toFixed(1)+' h left';
}
function formatFetchAge(state){
  const ts=Number(state&&state.updated_at);
  if(!Number.isFinite(ts)||ts<=0) return '';
  const age=Math.max(0,Math.round((Date.now()/1000)-ts));
  if(age<3) return 'updated just now';
  if(age<60) return 'updated '+age+'s ago';
  return 'updated '+Math.round(age/60)+'m ago';
}
function contentFetchRetryButtons(state){
  const failed=!!(state.error||state.status==='error');
  const cancelled=state.status==='cancelled'||!!state.cancelled;
  if((failed||cancelled)&&state.retryKind==='zim'&&state.packId){
    return `<button class="btn" onclick="retryFetchZim('${escapeHtml(state.packId)}')">Retry ZIM</button>`;
  }
  if((failed||cancelled)&&state.retryKind==='maps'&&state.packId){
    return `<button class="btn" onclick="retryFetchTiles('${escapeHtml(state.packId)}','${escapeHtml(state.country||'')}')">Retry tiles</button>`;
  }
  if((failed||cancelled)&&state.retryKind==='expand'&&state.packId){
    return `<button class="btn" onclick="retryFetchExpand('${escapeHtml(state.packId)}')">Retry expand</button>`;
  }
  return '';
}
function paintContentFetchPanel(state){
  _contentFetchState=state||null;
  const panel=document.getElementById('contentFetchPanel');
  if(!panel) return;
  if(!state){
    panel.hidden=true;
    panel.classList.add('is-hidden');
    panel.style.display='none';
    return;
  }
  panel.hidden=false;
  panel.classList.remove('is-hidden');
  panel.style.display='block';
  panel.classList.remove('is-error','is-ok','is-busy','is-cancelled');
  const cancelled=state.status==='cancelled'||!!state.cancelled;
  const failed=!!(state.error||state.status==='error');
  const done=!!state.done||state.status==='ready';
  // Terminal statuses must never keep the spinner / indeterminate bar alive.
  const terminal=done||failed||cancelled||state.status==='ready'||state.status==='error'||state.status==='cancelled';
  const busy=!terminal;
  if(cancelled) panel.classList.add('is-cancelled');
  else if(failed) panel.classList.add('is-error');
  else if(done||state.status==='ready') panel.classList.add('is-ok');
  else panel.classList.add('is-busy');
  const titleText=document.getElementById('contentFetchTitleText');
  const spinner=document.getElementById('contentFetchSpinner');
  const check=document.getElementById('contentFetchCheck');
  const fill=document.getElementById('contentFetchFill');
  const stats=document.getElementById('contentFetchStats');
  const msg=document.getElementById('contentFetchMsg');
  const actions=document.getElementById('contentFetchActions');
  if(titleText) titleText.textContent=state.label||'Download progress';
  if(spinner){
    spinner.hidden=!busy;
    spinner.classList.toggle('hidden',!busy);
    spinner.setAttribute('aria-hidden',busy?'false':'true');
  }
  const showOk=terminal&&!failed&&!cancelled&&(done||state.status==='ready');
  if(check){
    check.hidden=!showOk;
    check.classList.toggle('hidden',!showOk);
    check.setAttribute('aria-hidden',showOk?'false':'true');
  }
  const dl=Number(state.downloaded||0), tot=Number(state.total||0);
  let pct=state.percent!=null?Number(state.percent):NaN;
  if(!Number.isFinite(pct)) pct=tot>0&&dl>0?Math.round(100*Math.min(dl,tot)/tot):NaN;
  if(showOk&&!Number.isFinite(pct)) pct=100;
  // Empty 0% bars look broken — use indeterminate while preparing / before bytes move.
  const indeterminate=busy&&(!!state.indeterminate||!Number.isFinite(pct)||dl<=0);
  if(fill){
    fill.classList.toggle('is-indeterminate', indeterminate);
    if(indeterminate){
      fill.style.width='42%';
      fill.style.animation='';
    }else{
      fill.classList.remove('is-indeterminate');
      fill.style.animation='none';
      fill.style.width=Math.max(0,Math.min(100,Number.isFinite(pct)?pct:(showOk?100:0)))+'%';
    }
  }
  const pctLabel=indeterminate
    ?(state.status||'working')+'…'
    :(Number.isFinite(pct)?(Math.round(pct)+'%'):(state.status||'…'));
  const bytesLabel=tot>0?(formatContentBytes(dl)+' / '+formatContentBytes(tot))
    :(dl>0?formatContentBytes(dl)+' downloaded':'');
  const rateLabel=busy&&state.bytes_per_sec>0?(formatContentBytes(state.bytes_per_sec)+'/s'):'';
  // Never show ETA when stalled, idle rate, or missing — avoids "~1s left" on null/0.
  const etaLabel=(!busy||state.stalled||!(state.bytes_per_sec>0))?'' : formatEta(state.eta_seconds);
  const stallLabel=busy&&state.stalled
    ?('no progress for '+Math.max(1,Number(state.stall_seconds)||0)+'s')
    :(busy&&Number(state.stall_seconds)>=8&&!(state.bytes_per_sec>0)
      ?('quiet '+Math.round(Number(state.stall_seconds))+'s')
      :'');
  const ageLabel=busy?formatFetchAge(state):'';
  if(stats) stats.textContent=[pctLabel, bytesLabel, rateLabel, etaLabel, stallLabel, ageLabel, busy&&state.phase?String(state.phase):'']
    .filter(Boolean).join(' · ');
  if(msg) msg.textContent=state.message||state.error||(cancelled?'Download cancelled':'');
  if(actions){
    const retry=contentFetchRetryButtons(state);
    if(retry){
      actions.innerHTML=retry;
    }else if(busy&&state.retryKind&&state.retryKind!=='expand'){
      actions.innerHTML=`<button class="btn secondary" type="button" onclick="cancelContentFetch()">Cancel</button>`;
    }else if(showOk&&state.retryKind==='maps'&&(state.country||state.packId)){
      actions.innerHTML=`<button class="btn" type="button" onclick="openAtlasMap('${escapeHtml(state.country||'')}')">Open map</button>`;
    }else{
      actions.innerHTML='';
    }
  }
}
async function cancelContentFetch(){
  const st=_contentFetchState;
  if(!st||!st.retryKind||st.retryKind==='expand') return;
  _contentFetchPoll++;
  _contentFetchActive=false;
  let url='', body={};
  if(st.retryKind==='maps'){
    url='/api/content/cancel-maps-fetch';
    body={id:st.packId||'',country:st.country||''};
  }else if(st.retryKind==='zim'){
    url='/api/content/cancel-zim-fetch';
    body={id:st.packId||'',pack:st.packSlug||''};
  }else{
    return;
  }
  const r=await api(url,{method:'POST',body:JSON.stringify(body)});
  const cancelled=r.ok!==false&&r.status==='cancelled';
  paintContentFetchPanel({
    ...st,
    done:true,
    status:cancelled?'cancelled':(st.status||'error'),
    cancelled:cancelled,
    message:cancelled?(r.message||'Download cancelled.'):(r.error||'Could not cancel download'),
    error:cancelled?'':(r.error||'cancel_failed'),
    indeterminate:false,
  });
  showMsg('contentMsg',cancelled?'Download cancelled — use Retry to start again.':(r.error||'Cancel failed'),cancelled?'info':'err');
  await refreshContentPage();
}
function restoreContentFetchPanel(){
  if(_contentFetchState) paintContentFetchPanel(_contentFetchState);
  if(_contentFetchState&&_contentFetchState.banner){
    showMsg('contentMsg',_contentFetchState.banner.text,_contentFetchState.banner.kind||'info');
  }
}
async function pollContentFetch(opts){
  const label=opts.label||'Download';
  const statusUrl=opts.statusUrl;
  const retryKind=opts.retryKind||'';
  const packId=opts.packId||'';
  const country=opts.country||'';
  const packSlug=opts.packSlug||'';
  const pollId=++_contentFetchPoll;
  _contentFetchActive=true;
  paintContentFetchPanel({
    label, status:'starting', phase:'starting', done:false, downloaded:0, total:opts.totalHint||0,
    indeterminate:true, message:opts.startMessage||'Starting download…', packId, country, packSlug, retryKind,
  });
  try{
    for(let i=0;i<900;i++){
      if(pollId!==_contentFetchPoll) return null;
      if(i) await new Promise(r=>setTimeout(r,1500));
      const st=await api(statusUrl);
      if(pollId!==_contentFetchPoll) return null;
      if(!st||st.status==='idle'){
        paintContentFetchPanel({
          label, status:'waiting', phase:'waiting', done:false, downloaded:0, total:opts.totalHint||0,
          indeterminate:true, message:'Waiting for download to start…', packId, country, packSlug, retryKind,
        });
        continue;
      }
      const cancelled=st.status==='cancelled';
      const failed=!!(st.error||st.status==='error');
      const tot=Number(st.total||opts.totalHint||0);
      const dl=Number(st.downloaded||0);
      // Only treat as finished when backend sets done — never when size_hint is merely reached.
      const reallyDone=!!st.done&&(st.status==='ready'||cancelled||failed);
      paintContentFetchPanel({
        label,
        status:st.status,
        phase:st.phase||st.status,
        done:reallyDone,
        downloaded:dl,
        total:tot,
        percent:reallyDone&&st.status==='ready'?100:st.percent,
        indeterminate:!reallyDone&&(!!st.indeterminate||(!st.done&&dl<=0&&!cancelled)),
        message:cancelled?(st.message||'Download cancelled'):(failed?(st.error||st.message||'Download failed'):(st.message||'')),
        error:st.error,
        cancelled,
        path:st.path,
        bytes_per_sec:reallyDone?0:st.bytes_per_sec,
        eta_seconds:reallyDone?null:st.eta_seconds,
        stalled:!!st.stalled&&!reallyDone,
        stall_seconds:st.stall_seconds,
        updated_at:st.updated_at,
        packId, country, packSlug, retryKind,
      });
      if(reallyDone){
        let banner;
        if(cancelled){
          banner={text:'Download cancelled. Use Retry to start again.',kind:'info'};
        }else if(failed){
          banner={text:(opts.failPrefix||'Download failed')+': '+(st.error||'unknown')+'. Use Retry.',kind:'err'};
        }else{
          banner={text:(opts.okMessage||'Ready')+(st.path?' ('+st.path+')':''),kind:'ok'};
        }
        showMsg('contentMsg',banner.text,banner.kind);
        if(_contentFetchState) _contentFetchState.banner=banner;
        // Ensure Maps registry matches filesystem before user opens the viewer.
        if(retryKind==='maps'&&!cancelled&&!failed){
          try{ await api('/api/content/maps-repair'); }catch(_e){}
        }
        return st;
      }
    }
    paintContentFetchPanel({
      label, status:'running', phase:'running', done:false, downloaded:0, total:opts.totalHint||0,
      indeterminate:true,
      message:'Still running in the background — leave this page open or check Content later.',
      packId, country, retryKind,
    });
    const banner={text:'Download still running in the background — check Content later.',kind:'info'};
    showMsg('contentMsg',banner.text,banner.kind);
    if(_contentFetchState) _contentFetchState.banner=banner;
    return null;
  }finally{
    if(pollId===_contentFetchPoll) _contentFetchActive=false;
  }
}
function resumeContentFetchesFromCatalogue(packs){
  if(_contentFetchActive) return;
  const list=packs||[];
  for(const p of list){
    if(p.tiles_status==='fetching'&&(p.country||p.id)){
      const cc=String(p.country||'').toLowerCase()||String(p.id||'').split('.').pop();
      pollMapsFetch({
        id:p.id,
        country:cc,
        target:'/srv/atlas/maps/'+cc,
        tiles_size_hint_bytes:p.size_hint_bytes||((p.tiles_fetch&&p.tiles_fetch.size_hint_bytes)||0),
      });
      return;
    }
    if(p.zim_status==='fetching'||(p.category==='knowledge'&&p.download_on_install&&p.installed&&p.zim_status==='pending')){
      // Only auto-resume explicit fetching ZIM status.
      if(p.zim_status==='fetching'){
        pollZimFetch({id:p.id, zim_pack_slug:(p.id||'').split('.').pop(), zim_size_hint_bytes:p.size_hint_bytes||0});
        return;
      }
    }
  }
}

async function followInstallFetch(r, opts){
  opts=opts||{};
  const refreshDuring=!!opts.refreshDuring;
  if(r.tiles_status==='fetching'){
    showMsg('contentMsg','Installed '+r.name+' — downloading map tiles…','info');
    // Seed sticky panel immediately, refresh catalogue chip, keep polling.
    paintContentFetchPanel({
      label:'Map tiles', status:'starting', phase:'starting', done:false,
      downloaded:0, total:r.tiles_size_hint_bytes||r.size_hint_bytes||0,
      indeterminate:true, message:'Starting map tile download…',
      packId:r.id||'', country:(r.target||'').split('/').filter(Boolean).pop()||r.country||'',
      retryKind:'maps',
    });
    const pollPromise=pollMapsFetch(r);
    if(refreshDuring) await refreshContentPage();
    await pollPromise;
    await refreshContentPage();
  }else if(r.zim_status==='fetching'){
    showMsg('contentMsg','Installed '+r.name+' — downloading Library ZIM…','info');
    const pollPromise=pollZimFetch(r);
    if(refreshDuring) await refreshContentPage();
    await pollPromise;
    await refreshContentPage();
  }else if(r.expand_status==='fetching'){
    showMsg('contentMsg','Installed '+r.name+' — downloading expand bundle…','info');
    const pollPromise=pollExpandFetch(r);
    if(refreshDuring) await refreshContentPage();
    await pollPromise;
    await refreshContentPage();
  }else{
    showMsg('contentMsg','Installed '+r.name+(r.tiles_status==='ready'?' (tiles ready)':(r.zim_status==='ready'?' (ZIM ready)':(' to '+(r.target||'')))),'ok');
    if(refreshDuring) await refreshContentPage();
  }
}

function mapsFullUrl(country){
  const cc=(country||'uk').toLowerCase();
  const path='/maps/?country='+encodeURIComponent(cc);
  // Prefer relative paths so the browser keeps the current origin (incl. :8787).
  // If we must leave loopback :80 (broken/missing atlas-proxy), go to CC :8787 —
  // never hardcode http://127.0.0.1/maps (port 80) without a port.
  try{
    const host=String(location.hostname||'');
    const port=String(location.port||'');
    const onLoopback=host==='127.0.0.1'||host==='localhost'||host==='[::1]';
    const onDefaultHttp=!port||port==='80';
    if(onLoopback && onDefaultHttp){
      return 'http://127.0.0.1:8787'+path;
    }
    return path;
  }catch(_e){
    return 'http://127.0.0.1:8787'+path;
  }
}
function openAtlasMap(country){

  location.assign(mapsFullUrl(country||'uk'));

async function ensureAtlasMapsApp(){

  });

    }
  };
  if(refreshBtn){

  if(!_chatThreadId) await createChatThread();
  const agent=(document.getElementById('agent')||{}).value||'atlas.guide';
  qEl.value='';
  _chatHistory.push({role:'user',content:text});
  renderChatLog(_chatHistory,true);
  if(sendBtn){sendBtn.disabled=true;sendBtn.textContent='Thinking…';}
  const r=await api('/api/ask',{method:'POST',body:JSON.stringify({
    prompt:text,agent,history:_chatHistory.slice(0,-1)
  })});
  if(sendBtn){sendBtn.disabled=false;sendBtn.textContent='Send';}
  const out=document.getElementById('out');
  if(out) out.textContent=JSON.stringify(r,null,2);
  const res=r.result||{};

    _chatHistory.push({role:'assistant',content:
      'This action needs your approval (e.g. fetching a web URL). Use Approve below, then ask again.'});

    await saveCurrentChatThread();
    refreshApprovals();
    return;
  }
  if(res.error||res.detail){

async function pollPulls(immediate){
  if(_pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
  async function tick(){
    if(!onModelsHash()){
      if(_pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
      return;
    }
    const active=_activePullJobs.filter(j=>j.status==='queued'||j.status==='running');
    if(!active.length){
      if(_pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
      return;
    }
    const ids=active.map(j=>j.id).filter(Boolean);
    if(!ids.length) return;
    let anyRunning=false;
    const updated=[];
    for(const id of ids){
      const s=await api('/api/models/pull/'+id);
      if(s.error) continue;
      updated.push(s);
      if(s.status==='queued'||s.status==='running') anyRunning=true;
    }
    if(updated.length){
      // Keep completed rows visible, replace matching ids
      const byId={};
      _activePullJobs.forEach(j=>{if(j.id) byId[j.id]=j;});
      updated.forEach(s=>{byId[s.id]=s;});
      setPullJobs(Object.values(byId));
    }
    if(!anyRunning){
      if(_pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
      if(!_pullRefreshPending && onModelsHash()){
        _pullRefreshPending=true;
        setTimeout(()=>{
          _pullRefreshPending=false;
          if(onSetupHash()) renderSetupWizard();
          else if(onModelsHash()) renderModels();
        },800);
      }
    }
  }
  if(immediate) await tick();
  if(_activePullJobs.some(j=>j.status==='queued'||j.status==='running')){
    _pullTimer=setInterval(tick,1200);
  }
}

function formatUpdateApplyMessage(r, fallbackOk){
  if(!r||r.error==='bad_response'){
    return {ok:false,text:'Update failed (empty/invalid server response). Check atlas-command-centre logs.'};
  }
  if(r.error||r.ok===false){
    const detail=r.detail||r.error||'Update failed';
    if(r.rolled_back){
      return {ok:false,text:'Update failed and rolled back to the previous snapshot. '+detail};
    }
    if(String(detail).toLowerCase().includes('signature')){
      return {ok:false,text:'Refused: '+detail+'. Stable/release requires a signed bundle (or ATLAS_ALLOW_UNSIGNED=1 for alpha/dev).'};
    }
    if(String(detail).toLowerCase().includes('disk space')||String(detail).toLowerCase().includes('insufficient disk')){
      return {ok:false,text:'Not enough free disk to continue. '+detail};
    }
    return {ok:false,text:detail};
  }
  const ver=r.version||r.detail||fallbackOk||'ok';
  return {ok:true,text:'Applied '+ver+'. Snapshot kept for rollback if a later health check fails.'};
}

  const box=document.getElementById('updateStatus');
  const msg=document.getElementById('updateMsg');
  if(btn) btn.disabled=true;
  if(box) box.innerHTML='<p style="color:var(--muted)">Checking channel…</p>';
  if(msg) msg.innerHTML='';
  const r=await api('/api/updates/check');
  if(r._status===404||r.error==='not_found'){
    if(box) box.innerHTML=`<p class="msg err">Update API not on this device yet — run dev-pull on the VM and restart <code>atlas-command-centre</code>.</p>`;
    if(btn) btn.disabled=false;
    return;
  }
  if(r.error){
    const ch=escapeHtml(r.channel||'stable');
    const cur=escapeHtml(r.current_version||'?');
    if(box) box.innerHTML=`<div class="stat-row"><span>Channel</span><span><strong>${ch}</strong></span></div>
      <div class="stat-row"><span>Installed</span><span>v${cur}</span></div>
      <p class="msg err" style="margin-top:.75rem">${escapeHtml(r.detail||r.error)}</p>`;
    if(btn){btn.disabled=false;btn.textContent='Check for updates';btn.onclick=checkOnlineUpdate;}
    return;
  }
  if(r.up_to_date){
    if(box) box.innerHTML=`<div class="stat-row"><span>Channel</span><span><strong>${escapeHtml(r.channel||'stable')}</strong></span></div>
      <div class="stat-row"><span>Installed</span><span>v${escapeHtml(r.current_version||r.version||'?')}</span></div>
      <p style="color:var(--accent);margin-top:.75rem">You're up to date.</p>`;
    if(btn){btn.disabled=false;btn.textContent='Check for updates';btn.onclick=checkOnlineUpdate;}
    return;
  }
  _updateOffer=r;
  const sz=r.bundle_size?(r.bundle_size>=1048576?Math.round(r.bundle_size/(1024*1024))+' MB':Math.round(r.bundle_size/1024)+' KB'):'unknown size';
  if(box) box.innerHTML=`
    <div class="stat-row"><span>Channel</span><span><strong>${escapeHtml(r.channel||'stable')}</strong></span></div>
    <div class="stat-row"><span>Update</span><span><strong>v${escapeHtml(r.current_version||'?')} → v${escapeHtml(r.version||'?')}</strong></span></div>
    <p style="font-size:.85rem;color:var(--muted);margin-top:.75rem">${escapeHtml(r.release_notes||'')}</p>
    <p style="font-size:.85rem;color:var(--muted)">Size: ${sz} · Published ${escapeHtml(r.published_at||'')}</p>`;
  if(btn){btn.textContent='Download and install';btn.disabled=false;btn.onclick=downloadOnlineUpdate;}
}
async function downloadOnlineUpdate(){
  if(!_updateOffer) return;
  // Refresh offer so we don't apply a stale bundle after channel.json changes.
  const fresh=await api('/api/updates/check');
  if(fresh&&fresh.available) _updateOffer=fresh;
  const fromTo=`v${_updateOffer.current_version||'?'} → v${_updateOffer.version||'?'}`;
  const btn=document.getElementById('btnCheckUpdate');
  const prog=document.getElementById('updateProgress');
  const fill=document.getElementById('updateProgressFill');
  const ptxt=document.getElementById('updateProgressText');
  if(btn) btn.disabled=true;
  if(prog) prog.style.display='block';
  if(ptxt) ptxt.textContent='Downloading '+fromTo+'…';
  await api('/api/updates/download',{method:'POST',body:JSON.stringify({url:_updateOffer.bundle_url,sha256:_updateOffer.bundle_sha256,size:_updateOffer.bundle_size||0})});
  const poll=setInterval(async()=>{
    const s=await api('/api/updates/download-status');
    if(s.done){
      clearInterval(poll);
      if(s.error){
        if(fill) fill.style.width='0%';
        const err=String(s.error||'');
        const msg=(err.toLowerCase().includes('disk'))
          ?('Not enough free disk: '+err)
          :('Download failed: '+err);
        showMsg('updateMsg',msg,'err');
        if(btn){btn.disabled=false;btn.textContent='Retry download';btn.onclick=downloadOnlineUpdate;}
        return;
      }
      if(fill) fill.style.width='100%';
      if(ptxt) ptxt.textContent='Download complete — applying '+fromTo+'…';
      const ar=await api('/api/updates/apply',{method:'POST',body:JSON.stringify({path:s.path})});
      const formatted=formatUpdateApplyMessage(ar,_updateOffer.version);
      showMsg('updateMsg',formatted.text,formatted.ok?'ok':'err');
      if(btn){btn.disabled=false;btn.textContent='Check for updates';btn.onclick=checkOnlineUpdate;}
      if(prog) prog.style.display='none';
    } else if(s.total>0){
      const pct=Math.round((s.downloaded/s.total)*100);
      if(fill) fill.style.width=pct+'%';
      if(ptxt) ptxt.textContent=Math.round(s.downloaded/(1024*1024))+' / '+Math.round(s.total/(1024*1024))+' MB ('+fromTo+')';
    }
  },1000);
}
async function previewUpdate(path){

    <p style="font-size:.8125rem;color:var(--muted)">Publisher: ${escapeHtml(m.publisher||'unknown')} · Channel: ${escapeHtml(m.channel||'bundle')}</p>

const WIZARD_LABELS={
  welcome:'Welcome',
  device:'Device',
  ai:'AI model',
  content:'Content',
  sharing:'Sharing',
  agents:'Agents',
  recovery:'Recovery',
};

let _wizardDraft={network_mode:null,default_agent:null,model_tag:null,content_ids:[]};

async function renderSetupWizard(){
  const st=await api('/api/setup/state');
  const steps=st.steps||['welcome','device','ai','content','sharing','agents','recovery'];
  const step=Math.max(1,Math.min(steps.length,Number(st.step)||1));
  const current=steps[step-1]||'welcome';
  const choices=st.choices||{};
  const live=st.live||{};
  const pct=Math.round((step/steps.length)*100);
  _wizardDraft={
    network_mode:choices.network_mode||_wizardDraft.network_mode||'private_device',
    default_agent:choices.default_agent||_wizardDraft.default_agent||'atlas.guide',
    model_tag:choices.model_tag||_wizardDraft.model_tag||null,
    content_ids:Array.isArray(choices.content_ids)?choices.content_ids.slice():(_wizardDraft.content_ids||[]),
  };
  const dots=steps.map((s,i)=>{
    const n=i+1;
    const cls=n<step?'done':(n===step?'current':'');
    return `<li class="${cls}">${n}. ${escapeHtml(WIZARD_LABELS[s]||s)}</li>`;
  }).join('');
  const body=wizardStepHtml(current,st,live);
  const canSkip=(current==='ai'&&live.model&&live.model.ready)
    ||['content','agents','recovery','sharing'].includes(current);
  const isLast=step>=steps.length;
  const backBtn=step>1?`<button type="button" class="btn secondary" onclick="wizardBack()">Back</button>`:'';
  const skipBtn=canSkip&&!isLast?`<button type="button" class="btn secondary" onclick="wizardSkip()">Skip</button>`:'';
  const nextBtn=isLast
    ?`<button type="button" class="btn" id="wizFinishBtn" onclick="wizardFinish(false)">Finish setup</button>`
    :`<button type="button" class="btn" id="wizNextBtn" onclick="wizardNext()">Next</button>`;
  const doneNote=st.completed?`<div class="msg ok" style="margin-bottom:1rem">Setup already completed. You can revisit any step.</div>`:'';
  view.innerHTML=`<div class="wizard-wrap">
    ${doneNote}
    <p class="page-intro">Step ${step} of ${steps.length}: <strong>${escapeHtml(WIZARD_LABELS[current]||current)}</strong></p>
    <ul class="wizard-steps">${dots}</ul>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="wizard-panel">${body}</div>
    <div id="wizMsg"></div>
    <div class="wizard-nav">${backBtn}<span class="spacer"></span>${skipBtn}${nextBtn}</div>
  </div>`;
  if(current==='ai'){
    const jobs=(live.model&&live.model.pull_jobs)||[];
    setPullJobs(jobs);
    if(jobs.some(j=>j.status==='queued'||j.status==='running')) pollPulls(true);
  }
  if(current==='content') restoreContentFetchPanel();
}

function wizardStepHtml(current,st,live){
  if(current==='welcome'){
    return `<h2>Welcome to Atlas</h2>
      <p>Atlas is local-first: AI, knowledge, and agents run on this device. Internet is only needed when you choose to download models or packs.</p>
      <p>This short wizard configures your device, AI model, optional content, network sharing, default agent, and a recovery backup.</p>`;
  }
  if(current==='device'){
    const rec=live.recommend||{};
    const hw=rec.hardware||{};
    const gpu=live.gpu||{};
    const ram=rec.ram_gb||hw.ram_gb||'?';
    const vram=rec.vram_gb||hw.vram_gb;
    const profile=rec.profile||hw.profile||'?';
    const gpuName=(gpu.gpus&&gpu.gpus[0]&&gpu.gpus[0].name)||gpu.name||rec.gpu||'none detected';
    return `<h2>Your device</h2>
      <p>Atlas probed this machine so recommendations stay realistic.</p>
      <div class="stat-row"><span>RAM</span><span><strong>${escapeHtml(String(ram))} GB</strong></span></div>
      <div class="stat-row"><span>GPU</span><span><strong>${escapeHtml(String(gpuName))}</strong></span></div>
      ${vram!=null?`<div class="stat-row"><span>VRAM</span><span><strong>${escapeHtml(String(vram))} GB</strong></span></div>`:''}
      <div class="stat-row"><span>Model profile</span><span><strong>${escapeHtml(String(profile))}</strong></span></div>`;
  }
  if(current==='ai'){
    const m=live.model||{};
    const rec=m.recommended||(live.recommend&&live.recommend.recommended)||null;
    const ready=!!m.ready;
    const tag=rec&&rec.tag;
    if(tag) _wizardDraft.model_tag=tag;
    return `<h2>AI model</h2>
      <p>Download a local model once. Chat and agents stay offline afterwards.</p>
      ${ready?`<div class="msg ok">A model is ready${m.profile?' ('+escapeHtml(m.profile)+')':''}.</div>`:''}
      ${rec?`<div class="callout" style="margin-top:.75rem">
        <strong>${escapeHtml(rec.title||rec.tag)}</strong>
        <p>${escapeHtml(rec.blurb||'')} · ~${escapeHtml(String(rec.size_gb||'?'))} GB · <code>${escapeHtml(rec.tag)}</code>
          ${rec.installed?' · installed':''}</p>
        ${rec.installed||ready?'':`<button type="button" class="btn dl-btn" data-tag="${escapeHtml(rec.tag)}" onclick="wizardPullModel('${escapeHtml(rec.tag)}')">Download recommended</button>`}
      </div>`:`<p class="msg info">No beginner recommendation for this hardware — visit Models after setup.</p>`}
      <div class="download-panel" id="downloadPanel" style="margin-top:1rem">
        <h2>Download progress</h2>
        <div id="pullJobs"><p class="download-msg">No download in progress.</p></div>
      </div>
      ${!m.ollama_reachable?'<p class="msg err" style="margin-top:.75rem">Ollama is not running. Start it before downloading.</p>':''}`;
  }
  if(current==='content'){
    const packs=((live.catalogue&&live.catalogue.packs)||[]);
    if(!packs.length){
      return `<h2>Content packs</h2>
        <p>Optional maps and knowledge packs. The catalogue is empty on this device — you can skip and install later from Content.</p>`;
    }
    const rows=packs.map(p=>{
      const id=p.id;
      return `<div class="wiz-pack-row">
        <div>
          <strong>${escapeHtml(p.name||id)}</strong>
          <div style="font-size:.8125rem;color:var(--text-3)">${escapeHtml(p.description||p.type||'')}</div>
        </div>
        <div>
          ${p.installed?`<span class="chip chip-ok">Installed</span>`
            :`<button type="button" class="btn secondary" id="wizPack_${escapeHtml(id)}" onclick="wizardInstallPack('${escapeHtml(id)}')">Install</button>`}
        </div>
      </div>`;
    }).join('');
    return `<h2>Content packs</h2>
      <p>Install optional offline packs now, or skip and add them later. Large map/Wikipedia downloads show progress below.</p>
      ${contentFetchPanelHtml()}
      <div class="card panel">${rows}</div>
      <div id="wizContentMsg" style="margin-top:.5rem"></div>`;
  }
  if(current==='sharing'){
    const cur=_wizardDraft.network_mode||'private_device';
    const liveMode=(live.network&&live.network.mode)||'private_device';
    const opts=[
      ['private_device','This device only','Loopback / private — strongest default.'],
      ['trusted_lan','Trusted LAN','Share on your local network when you trust it.'],
      ['private_hotspot','Private hotspot','Expose Atlas via a controlled hotspot profile.'],
      ['later','Decide later','Keep the firstboot default; change anytime in System.'],
    ];
    return `<h2>Network sharing</h2>
      <p>Current mode: <strong>${escapeHtml(liveMode)}</strong>. Pick how Atlas should be reachable.</p>
      ${opts.map(([id,title,desc])=>
        `<button type="button" class="wiz-choice ${cur===id?'selected':''}" onclick="wizardPickNetwork('${id}',this)">
          <strong>${escapeHtml(title)}</strong><span>${escapeHtml(desc)}</span>
        </button>`).join('')}`;
  }
  if(current==='agents'){
    const agents=live.agents||[];
    const cur=_wizardDraft.default_agent||'atlas.guide';
    if(!agents.length){
      return `<h2>Default agent</h2><p>No agents loaded yet — Atlas Guide will be used by default.</p>`;
    }
    return `<h2>Default agent</h2>
      <p>Choose which assistant opens first in Chat.</p>
      ${agents.map(a=>
        `<button type="button" class="wiz-choice ${cur===a.id?'selected':''}" onclick="wizardPickAgent('${escapeHtml(a.id)}',this)">
          <strong>${escapeHtml(a.name||a.id)}</strong><span>${escapeHtml(a.purpose||'')}</span>
        </button>`).join('')}`;
  }
  if(current==='recovery'){
    return `<h2>Recovery backup</h2>
      <p>Create an encrypted backup of Atlas data before you finish. You can skip and back up later from System.</p>
      <div class="inline-form">
        <input id="wizBakPass" type="password" placeholder="Backup passphrase" autocomplete="new-password" />
        <button type="button" class="btn secondary" onclick="wizardCreateBackup()">Create backup</button>
      </div>
      <div id="wizBakMsg" style="margin-top:.5rem"></div>
      <p style="margin-top:1rem;font-size:.85rem;color:var(--text-3)">Finish marks setup complete and returns you to Home.</p>
      <button type="button" class="btn secondary" style="margin-top:.5rem" onclick="wizardFinish(true)">Skip backup &amp; finish</button>`;
  }
  return `<h2>${escapeHtml(current)}</h2><p>Continue to the next step.</p>`;
}

function wizardPickNetwork(mode,el){
  _wizardDraft.network_mode=mode;
  document.querySelectorAll('.wiz-choice').forEach(n=>n.classList.remove('selected'));
  if(el) el.classList.add('selected');
}
function wizardPickAgent(id,el){
  _wizardDraft.default_agent=id;
  document.querySelectorAll('.wiz-choice').forEach(n=>n.classList.remove('selected'));
  if(el) el.classList.add('selected');
}
async function wizardPullModel(tag){
  await pullModel(tag,null);
  _wizardDraft.model_tag=tag;
}
async function wizardInstallPack(id){
  showMsg('wizContentMsg','Installing '+id+'…','info');
  let r=await api('/api/content/install',{method:'POST',body:JSON.stringify({catalogue_id:id})});
  if(r.error==='large_pack_confirm_required'||r.error==='large_map_confirm_required'){
    const warn=r.size_warning||'This map pack may download a large tile archive.';
    if(!confirm(warn+'\n\nContinue?')){
      showMsg('wizContentMsg','Install cancelled','info');
      return;
    }
    r=await api('/api/content/install',{method:'POST',body:JSON.stringify({catalogue_id:id,confirm_large:true})});
  }
  if(r.error||r._status>=400){
    showMsg('wizContentMsg',r.error||'Install failed','err');
    return;
  }
  if(!_wizardDraft.content_ids.includes(id)) _wizardDraft.content_ids.push(id);
  if(r.tiles_status==='fetching'){
    showMsg('wizContentMsg','Installed '+id+' — downloading tiles…','info');
    await pollMapsFetch(r);
  }else if(r.zim_status==='fetching'){
    showMsg('wizContentMsg','Installed '+id+' — downloading Wikipedia ZIM…','info');
    await pollZimFetch(r);
  }else if(r.expand_status==='fetching'){
    showMsg('wizContentMsg','Installed '+id+' — downloading expand bundle…','info');
    await pollExpandFetch(r);
  }else{
    showMsg('wizContentMsg','Installed '+id,'ok');
  }
  const btn=document.getElementById('wizPack_'+id);
  if(btn) btn.outerHTML='<span class="chip chip-ok">Installed</span>';
  await api('/api/setup/save',{method:'POST',body:JSON.stringify({choices:{content_ids:_wizardDraft.content_ids}})});
}
async function wizardCreateBackup(){
  const pass=(document.getElementById('wizBakPass')||{}).value||'';
  if(!pass){showMsg('wizBakMsg','Enter a passphrase.','err');return;}
  showMsg('wizBakMsg','Creating encrypted backup…','info');
  const r=await api('/api/backup/create',{method:'POST',body:JSON.stringify({passphrase:pass})});
  if(r.error||!r.ok){showMsg('wizBakMsg',r.error||'Backup failed','err');return;}
  showMsg('wizBakMsg','Saved '+(r.path||'backup'),'ok');
}
async function wizardPersist(step,extraChoices,completed){
  const choices={
    network_mode:_wizardDraft.network_mode,
    default_agent:_wizardDraft.default_agent,
    model_tag:_wizardDraft.model_tag,
    content_ids:_wizardDraft.content_ids||[],
    ...(extraChoices||{}),
  };
  const body={step,choices};
  if(completed!=null) body.completed=!!completed;
  return api('/api/setup/save',{method:'POST',body:JSON.stringify(body)});
}
async function wizardApplySharing(){
  const mode=_wizardDraft.network_mode||'later';
  if(mode==='later'||mode==null){
    return api('/api/network/mode',{method:'POST',body:JSON.stringify({mode:'later'})});
  }
  const r=await api('/api/network/mode',{method:'POST',body:JSON.stringify({mode})});
  if(r.deferred){
    showMsg('wizMsg','Network daemon unavailable — mode saved for later apply.','info');
    return r;
  }
  if(r.error||r._status>=400){
    showMsg('wizMsg',r.error||r.detail||'Could not apply network mode','err');
    return r;
  }
  return r;
}
async function wizardNext(){
  const st=await api('/api/setup/state');
  const steps=st.steps||[];
  const step=Number(st.step)||1;
  const current=steps[step-1];
  if(current==='sharing'){
    const r=await wizardApplySharing();
    if(r&&!r.deferred&&(r.error||r._status>=400)&&!r.skipped) return;
  }
  if(current==='ai'&&_wizardDraft.model_tag){
    /* choice already in draft */
  }
  const next=Math.min(steps.length,step+1);
  await wizardPersist(next);
  page();
}
async function wizardBack(){
  const st=await api('/api/setup/state');
  const step=Math.max(1,(Number(st.step)||1)-1);
  await wizardPersist(step);
  page();
}
async function wizardSkip(){
  const st=await api('/api/setup/state');
  const steps=st.steps||[];
  const step=Number(st.step)||1;
  const current=steps[step-1];
  if(current==='sharing'){
    _wizardDraft.network_mode='later';
    await wizardApplySharing();
  }
  const next=Math.min(steps.length,step+1);
  await wizardPersist(next);
  page();
}
async function wizardFinish(skipBackup){
  if(!skipBackup){
    const pass=(document.getElementById('wizBakPass')||{}).value||'';
    if(pass){
      showMsg('wizMsg','Creating backup…','info');
      const r=await api('/api/backup/create',{method:'POST',body:JSON.stringify({passphrase:pass})});
      if(r.error||!r.ok){
        showMsg('wizMsg',r.error||'Backup failed — fix or use Skip backup','err');
        return;
      }
    }
  }
  const st=await api('/api/setup/state');
  const n=(st.steps&&st.steps.length)||7;
  await wizardPersist(n,{ },true);
  location.hash='#/home';
}
async function nextStep(){
  await wizardNext();
}
async function reauth(){
  const r=await api('/api/auth/reauth',{method:'POST',body:JSON.stringify({password:rp.value})});
  const el=document.getElementById('reout');
  if(!el) return;
  if(r.ok) el.innerHTML='<div class="msg ok">Password confirmed.</div>';
  else el.innerHTML='<div class="msg err">Confirmation failed.</div>';
}
async function boot(){
  closeModal();
  try{
    const ok=await ensureSession();
    if(ok) page();
  }catch(e){
    console.error(e);
    showGateError('Startup error: '+(e&&e.message?e.message:String(e)));
  }
}
window.addEventListener('hashchange',()=>{
  if(!onModelsHash() && _pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
  if(authed) page();
});
boot();
