<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Atlas Command Centre</title>
<style>
/* Atlas Command Centre — premium dark design system */
:root{
  --bg-0:#030304;--bg-1:#08090d;--bg-2:#0e1016;
  --surface-0:#111318;--surface-1:#161922;--surface-2:#1c2030;--surface-3:#222838;
  --border:rgba(255,255,255,.06);--border-strong:rgba(255,255,255,.11);
  --primary:#6366f1;--primary-bright:#818cf8;--primary-dim:rgba(99,102,241,.14);
  --cyan:#38bdf8;--cyan-dim:rgba(56,189,248,.1);
  --success:#34d399;--success-dim:rgba(52,211,153,.12);
  --warn:#fbbf24;--warn-dim:rgba(251,191,36,.1);
  --danger:#f87171;--danger-dim:rgba(248,113,113,.1);
  --text:#f4f4f5;--text-2:#a1a1aa;--text-3:#71717a;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.35);
  --shadow-md:0 8px 24px rgba(0,0,0,.45);
  --shadow-glow:0 0 40px rgba(99,102,241,.08);
  --font:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,"Cascadia Code","SF Mono",monospace;
  --ease:cubic-bezier(.4,0,.2,1);
  /* legacy aliases */
  --bg:var(--bg-0);--bg-subtle:var(--bg-1);--panel:var(--surface-0);--panel-elevated:var(--surface-2);
  --accent:var(--primary-bright);--accent-bright:var(--text);--accent-dim:var(--primary-dim);--accent-glow:rgba(99,102,241,.06);
  --muted:var(--text-2);
}
*{box-sizing:border-box}
body{
  margin:0;font-family:var(--font);color:var(--text);min-height:100vh;
  background:
    radial-gradient(ellipse 90% 60% at 10% -10%,rgba(99,102,241,.09),transparent 50%),
    radial-gradient(ellipse 60% 40% at 100% 0%,rgba(56,189,248,.06),transparent 45%),
    var(--bg-0);
  -webkit-font-smoothing:antialiased;
}
a{color:var(--primary-bright);text-decoration:none;transition:color .15s var(--ease)}
a:hover{color:#fff}
.hidden{display:none!important}

/* Shell */
.shell{display:flex;min-height:100vh}
.sidebar{
  width:252px;flex-shrink:0;display:flex;flex-direction:column;
  background:linear-gradient(180deg,var(--surface-0) 0%,var(--bg-1) 100%);
  border-right:1px solid var(--border);padding:1.25rem .85rem;
}
.sidebar-brand{display:flex;align-items:center;gap:.65rem;padding:.25rem .65rem 1.25rem;margin-bottom:.5rem}
.sidebar-brand .mark,.auth-brand .mark{
  width:34px;height:34px;object-fit:contain;flex-shrink:0;display:block;
  filter:drop-shadow(0 0 12px rgba(120,160,255,.4));
}
.sidebar-brand .wordmark{font-size:.72rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--text-3);line-height:1.2}
.sidebar-brand .wordmark strong{display:block;font-size:.95rem;letter-spacing:.06em;color:var(--text);font-weight:600;text-transform:none}
.nav-section{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);padding:.75rem .65rem .35rem}
.nav-item{
  display:flex;align-items:center;gap:.65rem;width:100%;text-align:left;
  background:transparent;border:0;color:var(--text-2);padding:.55rem .65rem;
  cursor:pointer;font:inherit;font-size:.875rem;font-weight:500;border-radius:var(--radius-sm);
  transition:background .18s var(--ease),color .18s var(--ease),transform .18s var(--ease);
}
.nav-item svg{width:18px;height:18px;opacity:.75;flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text);transform:translateX(2px)}
.nav-item.active{
  background:var(--primary-dim);color:var(--text);
  box-shadow:inset 0 0 0 1px rgba(99,102,241,.25);
}
.nav-item.active svg{opacity:1;color:var(--primary-bright)}
.sidebar-foot{margin-top:auto;padding:.75rem .65rem 0;border-top:1px solid var(--border);font-size:.75rem;color:var(--text-3)}
.shell-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.topbar{
  height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:0 1.75rem;border-bottom:1px solid var(--border);
  background:rgba(8,9,13,.75);backdrop-filter:blur(16px);position:sticky;top:0;z-index:20;
}
.topbar-left{display:flex;flex-direction:column;gap:.1rem;min-width:0}
.topbar-title{font-size:1.05rem;font-weight:600;letter-spacing:-.02em;color:var(--text);margin:0}
.topbar-sub{font-size:.8125rem;color:var(--text-3);margin:0}
.topbar-right{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.content{flex:1;padding:1.5rem 1.75rem 2.5rem;overflow-y:auto;animation:fadeIn .25s var(--ease);min-height:0}
.content.chat-page{display:flex;flex-direction:column;overflow:hidden;padding:.75rem 1.25rem 1rem}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Typography */
h1.page-title{font-size:1.5rem;font-weight:600;margin:0 0 .35rem;letter-spacing:-.02em}
h2.section-head{font-size:.7rem;font-weight:600;margin:0 0 .75rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.12em}
.page-intro{margin:0 0 1.5rem;color:var(--text-2);line-height:1.6;max-width:40rem;font-size:.9rem}
p,li{color:var(--text-2);line-height:1.55}
.section-title{font-size:.7rem;font-weight:600;margin:1.75rem 0 .75rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.12em}
.section-block{margin-bottom:1.75rem}
.section-head-row{display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;margin-bottom:.85rem}
.section-head-row h2{margin:0}
.section-head-row p{margin:0;font-size:.8125rem;color:var(--text-3)}

/* Buttons & inputs */
input,textarea,select{
  width:100%;background:var(--bg-1);border:1px solid var(--border-strong);
  color:var(--text);padding:.65rem .85rem;margin:.35rem 0 .75rem;font:inherit;
  border-radius:var(--radius-sm);transition:border-color .15s,box-shadow .15s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:rgba(99,102,241,.45);box-shadow:0 0 0 3px var(--primary-dim)}
button:focus-visible{outline:2px solid var(--primary-bright);outline-offset:2px}
textarea{min-height:100px;resize:vertical}
.btn{
  background:linear-gradient(180deg,var(--primary-bright) 0%,var(--primary) 100%);
  color:#fff;border:0;padding:.6rem 1.1rem;cursor:pointer;font-weight:600;
  border-radius:var(--radius-sm);font-family:var(--font);font-size:.875rem;
  box-shadow:0 2px 8px rgba(99,102,241,.25);
  transition:transform .15s var(--ease),box-shadow .15s var(--ease),opacity .15s;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.35)}
.btn:active{transform:translateY(0)}
.btn.secondary{background:transparent;color:var(--text);border:1px solid var(--border-strong);box-shadow:none;margin-left:.5rem}
.btn.secondary:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.16);transform:none}
.btn.ghost{background:transparent;color:var(--text-2);border:1px solid var(--border);box-shadow:none;padding:.45rem .75rem;font-size:.8125rem}
.btn.danger{background:transparent;color:var(--danger);border:1px solid rgba(248,113,113,.35);box-shadow:none}
.btn-group{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.btn-group .btn,.btn-group .btn.secondary{margin-left:0}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.text-danger{color:var(--danger)}.text-warn{color:var(--warn)}

/* Chips */
.chip,.pill-sm{
  display:inline-flex;align-items:center;gap:.35rem;font-size:.6875rem;font-weight:600;
  padding:.25rem .55rem;border-radius:999px;text-transform:uppercase;letter-spacing:.05em;
}
.chip-ok,.pill-sm.ok{background:var(--success-dim);color:var(--success)}
.chip-bad,.pill-sm.bad{background:var(--danger-dim);color:var(--danger)}
.chip-warn,.pill-sm.wait{background:var(--warn-dim);color:var(--warn)}
.chip-neutral{background:rgba(255,255,255,.06);color:var(--text-2)}
.chip-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* Cards */
.card,.panel{
  border:1px solid var(--border);background:linear-gradient(180deg,var(--surface-1) 0%,var(--surface-0) 100%);
  padding:1.15rem 1.25rem;margin:.75rem 0;border-radius:var(--radius);
  transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .2s;
}
.card-interactive{cursor:pointer}
.card-interactive:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(99,102,241,.2)}
.card h3{margin:0 0 .4rem;font-size:.95rem;color:var(--text);font-weight:600}
.card p{margin:.35rem 0;font-size:.875rem}
.card .tools{font-size:.8125rem;color:var(--text-3);font-family:var(--mono)}

/* Dashboard */
.hero{
  position:relative;border-radius:var(--radius-lg);padding:1.75rem 1.85rem;margin-bottom:1.5rem;
  border:1px solid var(--border-strong);
  background:linear-gradient(135deg,var(--surface-2) 0%,var(--surface-0) 55%,var(--bg-1) 100%);
  box-shadow:var(--shadow-glow);overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-40%;right:-15%;width:55%;height:180%;
  background:radial-gradient(circle,rgba(99,102,241,.18),transparent 65%);pointer-events:none;
}
.hero-inner{position:relative;z-index:1}
.hero-eyebrow{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--primary-bright);margin:0 0 .5rem}
.hero h1{font-size:1.65rem;font-weight:600;margin:0 0 .5rem;letter-spacing:-.03em}
.hero-desc{color:var(--text-2);font-size:.925rem;max-width:36rem;margin:0 0 1.15rem;line-height:1.55}
.hero-actions{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.hero-status{margin-top:1rem;display:flex;flex-wrap:wrap;gap:.5rem}

.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.75rem}
.action-tile{
  display:flex;flex-direction:column;gap:.45rem;padding:1rem;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface-1);cursor:pointer;text-decoration:none!important;
  transition:transform .2s var(--ease),box-shadow .2s,border-color .2s;
}
.action-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:rgba(99,102,241,.25)}
.action-tile .ico{
  width:36px;height:36px;border-radius:10px;display:grid;place-items:center;
  background:var(--primary-dim);color:var(--primary-bright);font-size:1rem;
}
.action-tile strong{font-size:.875rem;color:var(--text);font-weight:600}
.action-tile span{font-size:.75rem;color:var(--text-3);line-height:1.35}

.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.75rem}
.metric-card{
  padding:1rem 1.05rem;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--surface-1);transition:transform .2s,border-color .2s;
}
.metric-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.1)}
.metric-card .label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:.45rem}
.metric-card .value{font-size:1.25rem;font-weight:600;color:var(--text);letter-spacing:-.02em}
.metric-card .meta{font-size:.75rem;color:var(--text-3);margin-top:.25rem}

.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem}
.service-card{
  padding:1rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface-1);
  display:flex;flex-direction:column;gap:.5rem;
}
.service-card-head{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.service-card strong{font-size:.875rem;color:var(--text)}
.service-card p{margin:0;font-size:.75rem;color:var(--text-3);line-height:1.4}
.service-card .svc-url{font-family:var(--mono);font-size:.68rem;color:var(--text-3)}

.activity-list{display:flex;flex-direction:column;gap:0}
.activity-row{
  display:flex;justify-content:space-between;gap:1rem;padding:.65rem 0;
  border-bottom:1px solid var(--border);font-size:.8125rem;
}
.activity-row:last-child{border-bottom:0}
.activity-row .when{color:var(--text-3);white-space:nowrap}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:960px){
  .sidebar{width:72px;padding:1rem .5rem}
  .sidebar .nav-item span,.sidebar-brand .wordmark,.nav-section,.sidebar-foot{display:none}
  .sidebar-brand{justify-content:center;padding:.25rem 0 1rem}
  .nav-item{justify-content:center;padding:.65rem}
}
@media(max-width:760px){
  .shell{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:.75rem}
  .sidebar-brand{padding:0 .5rem}
  .shell-main .topbar{padding:0 1rem}
  .content{padding:1rem}
  .grid-2{grid-template-columns:1fr}
}

/* Existing feature styles (chat, tables, etc.) */
.pre{white-space:pre-wrap;background:var(--bg-1);padding:.75rem;font-family:var(--mono);font-size:.8125rem;color:var(--text);border-radius:var(--radius-sm);border:1px solid var(--border)}
.download-panel{border:1px solid var(--border);background:var(--surface-1);padding:1rem 1.25rem;margin:1rem 0;border-radius:var(--radius)}
.download-panel h2{margin:0 0 .75rem;font-size:.875rem;color:var(--text);font-weight:600}
.progress-track{height:6px;background:var(--bg-0);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--cyan));width:0%;transition:width .35s ease;border-radius:999px}
.download-msg{font-size:.8125rem;color:var(--text-3);margin-top:.35rem;font-family:var(--mono)}
.spinner{display:inline-block;width:1rem;height:1rem;border:2px solid var(--border);border-top-color:var(--primary-bright);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.35rem}
@keyframes spin{to{transform:rotate(360deg)}}
.chat-page-shell{display:flex;flex-direction:column;flex:1;min-height:0;gap:.5rem}
.chat-toolbar{flex-shrink:0;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}
.chat-toolbar select{margin:0;flex:1;min-width:160px}
.chat-toolbar .btn,.chat-toolbar .btn.secondary{margin:0}
.chat-intro{margin:0;font-size:.8125rem;color:var(--text-3);flex:1 1 100%}
.chat-wrap{display:flex;flex-direction:column;flex:1;min-height:0;border:1px solid var(--border);background:var(--bg-1);border-radius:var(--radius);overflow:hidden}
.chat-layout{display:grid;grid-template-columns:220px minmax(0,1fr);gap:.75rem;flex:1;min-height:0;margin:0}
.chat-threads-panel{
  border:1px solid var(--border);background:var(--surface-0);border-radius:var(--radius);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;height:100%;
}
.chat-threads-head{
  padding:.7rem .8rem;border-bottom:1px solid var(--border);font-size:.68rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);flex-shrink:0;
}
.chat-threads-list{flex:1;overflow-y:auto;padding:.35rem}
.chat-thread-item{
  display:flex;align-items:flex-start;gap:.2rem;width:100%;
  padding:.15rem;border-radius:var(--radius-sm);transition:background .15s var(--ease);
}
.chat-thread-item:hover{background:rgba(255,255,255,.04)}
.chat-thread-item.active{background:var(--primary-dim);box-shadow:inset 0 0 0 1px rgba(99,102,241,.2)}
.chat-thread-main{
  flex:1;min-width:0;text-align:left;padding:.4rem .45rem;border:0;background:transparent;
  color:inherit;cursor:pointer;font:inherit;
}
.chat-thread-item .title{display:block;font-size:.8125rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-thread-item .when{display:block;font-size:.68rem;color:var(--text-3);margin-top:.12rem}
.chat-thread-delete,.chat-thread-rename{
  border:0;background:transparent;color:var(--text-3);cursor:pointer;padding:.15rem .25rem;
  border-radius:4px;font-size:.75rem;line-height:1;opacity:0;transition:opacity .15s,color .15s;
}
.chat-thread-item:hover .chat-thread-delete,.chat-thread-item:hover .chat-thread-rename,
.chat-thread-item.active .chat-thread-delete,.chat-thread-item.active .chat-thread-rename{opacity:1}
.chat-thread-delete:hover,.chat-thread-rename:hover{color:var(--primary-bright)}
.chat-thread-delete:hover{color:var(--danger)}
.chat-thread-actions{display:flex;flex-direction:column;gap:.1rem;flex-shrink:0;padding-top:.2rem}
.chat-main{min-width:0;display:flex;flex-direction:column;flex:1;min-height:0;height:100%}
.chat-input{display:flex;gap:.5rem;padding:.85rem 1rem;border-top:1px solid var(--border);align-items:flex-end;background:var(--surface-0);flex-shrink:0}
.chat-input textarea{flex:1;min-height:2.75rem;max-height:140px;margin:0;resize:none}
.chat-input .btn{flex-shrink:0;margin:0}
.approval-banner{display:none;margin:0;padding:.65rem .85rem;border:1px solid rgba(251,191,36,.35);background:var(--warn-dim);border-radius:var(--radius-sm);flex-shrink:0}
.approval-banner.show{display:block}
@media(max-width:960px){
  .chat-layout{grid-template-columns:1fr}
  .chat-threads-panel{display:none}
  .chat-thread-mobile{display:block;margin:0}
  .chat-intro{display:none}
}
.chat-thread-mobile{display:none;width:100%;margin:0}
.chat-log{flex:1;overflow-y:auto;padding:1rem 1rem 1.25rem;display:flex;flex-direction:column;gap:.75rem;min-height:0}
.bubble{max-width:85%;padding:.65rem .9rem;border-radius:var(--radius-sm);line-height:1.5;font-size:.9rem;white-space:pre-wrap;word-break:break-word}
.bubble.user{align-self:flex-end;background:var(--primary-dim);border:1px solid rgba(99,102,241,.2)}
.bubble.assistant{align-self:flex-start;background:var(--surface-2);border:1px solid var(--border)}
.bubble.system{align-self:center;color:var(--text-3);font-size:.8125rem}
.bubble.err{align-self:flex-start;background:var(--danger-dim);color:var(--danger);border:1px solid rgba(248,113,113,.25)}
.cite-box{margin-top:.5rem;padding:.5rem .65rem;border-left:2px solid var(--primary);background:var(--primary-dim);font-size:.8125rem;color:var(--text-2);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.file-browser{border:1px solid var(--border);background:var(--bg-0);min-height:220px;max-height:320px;overflow-y:auto;border-radius:var(--radius-sm)}
.file-row{display:flex;justify-content:space-between;align-items:center;padding:.55rem .75rem;border-bottom:1px solid var(--border);cursor:pointer;font-size:.875rem;transition:background .12s}
.file-row:hover{background:rgba(255,255,255,.03)}
.file-row.selected{background:var(--primary-dim)}
.file-row .meta{color:var(--text-3);font-size:.8125rem}
.breadcrumb{font-size:.8125rem;color:var(--text-3);margin:.5rem 0 .75rem;font-family:var(--mono)}
.msg{padding:.65rem .85rem;margin:.75rem 0;border-radius:var(--radius-sm);font-size:.875rem}
.msg.ok{background:var(--success-dim);color:var(--success);border:1px solid rgba(52,211,153,.2)}
.msg.err{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(248,113,113,.25)}
.msg.info{background:rgba(255,255,255,.03);color:var(--text-2);border:1px solid var(--border)}
.stat-row{display:flex;justify-content:space-between;padding:.45rem 0;border-top:1px solid var(--border);font-size:.875rem}
.stat-row:first-child{border-top:0}
.callout{border:1px solid var(--border-strong);background:var(--surface-2);padding:1rem 1.15rem;margin:1rem 0;border-radius:var(--radius)}
.callout.warn{border-color:rgba(251,191,36,.3);background:var(--warn-dim)}
.callout.ok{border-color:rgba(99,102,241,.25);background:var(--primary-dim)}
.empty-state{text-align:center;padding:1.75rem 1rem;color:var(--text-3);border:1px dashed var(--border);border-radius:var(--radius)}
.empty-state strong{display:block;color:var(--text);margin-bottom:.35rem;font-weight:600}
.data-table{width:100%;border-collapse:collapse;font-size:.875rem}
.data-table th,.data-table td{padding:.65rem .5rem;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
.data-table th{color:var(--text-3);font-weight:600;font-size:.6875rem;text-transform:uppercase;letter-spacing:.08em}
.backup-item{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.65rem 0;border-top:1px solid var(--border);flex-wrap:wrap}
.backup-item:first-child{border-top:0}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:100}
.modal{background:var(--surface-2);border:1px solid var(--border-strong);padding:1.35rem;max-width:420px;width:100%;border-radius:var(--radius-lg);box-shadow:var(--shadow-md)}
.auth-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem 1.25rem;position:relative;z-index:30;
}
.auth-screen::before{

async function ensureSession(){
  setGateStatus('Checking device…');
  const bootResp=await api('/api/auth/bootstrap');
  if(bootResp._status>=500 || bootResp.error==='bad_response'){
    showGateError('Could not reach the Command Centre API (HTTP '+(bootResp._status||'?')+').');
    return false;
  }
  if(bootResp.needs_bootstrap){
    showBootstrapGate('');
    return false;
  }
  const me=await api('/api/auth/session');
  if(me._status===401 || me.error==='unauthorized'){
    showLoginGate('');
    return false;
  }
  if(me._status>=400){
    showGateError(me.error||('Session check failed (HTTP '+me._status+')'));
    return false;
  }
  _sessionUser=me.username||'';
  hideAuth();
  authed=true;
  return true;
}

async function loadKbBrowser(){
  const q=_kbPath?`?path=${encodeURIComponent(_kbPath)}`:'';
  const b=await api('/api/knowledge/browse'+q);
  const crumb=document.getElementById('kbCrumb');
  const list=document.getElementById('kbList');
  if(!list) return;
  if(b.error){
    list.innerHTML=`<div class="msg err">${escapeHtml(kbError(b.error))}</div>`;
    return;
  }
  if(crumb){
    if(b.roots) crumb.innerHTML=`<a onclick="_kbPath='';loadKbBrowser()">Folders</a>`;
    else{
      const parts=[];
      if(b.parent!==null&&b.parent!==''){
        parts.push(`<a onclick="_kbPath=decodeURIComponent('${jsQuote(b.parent)}');_kbSelected='';loadKbBrowser()">Up</a>`);
      }else if(b.parent===''){
        parts.push(`<a onclick="_kbPath='';_kbSelected='';loadKbBrowser()">Folders</a>`);
      }
      parts.push(` <span>${escapeHtml(b.cwd||'')}</span>`);
      crumb.innerHTML=parts.join(' · ');
    }
  }
  const rows=(b.entries||[]).map(e=>{
    const icon=e.kind==='dir'?'[dir]':'[file]';
    const meta=e.kind==='file'?formatBytes(e.size):'folder';
    const sel=_kbSelected===e.path?' selected':'';
    const click=e.kind==='dir'
      ?`onclick="_kbPath=decodeURIComponent('${jsQuote(e.path)}');_kbSelected='';loadKbBrowser()"`
      :`onclick="selectKbFile(decodeURIComponent('${jsQuote(e.path)}'),decodeURIComponent('${jsQuote(e.name)}'))"`;
    return `<div class="file-row${sel}" data-path="${escapeHtml(e.path)}" ${click}>
      <span>${icon} ${escapeHtml(e.name)}</span><span class="meta">${meta}</span></div>`;
  }).join('');
  list.innerHTML=rows||'<div class="msg info" style="margin:.5rem">This folder is empty.</div>';
}
function selectKbFile(path,name){
  _kbSelected=path;
  const el=document.getElementById('kbSelected');
  const btn=document.getElementById('kbIngestBtn');
  if(el) el.innerHTML=`<strong>${escapeHtml(name)}</strong><br/><span style="font-size:.85rem;color:var(--muted)">${escapeHtml(path)}</span>`;
  if(btn) btn.disabled=false;
  document.querySelectorAll('.file-row').forEach(r=>{

async function ingestSelected(){

  const r=await api('/api/knowledge/ingest',{method:'POST',body:JSON.stringify({path:_kbSelected})});
  if(btn){btn.disabled=false;btn.textContent='Add to knowledge base';}
  if(r.error||!r.ok){
    showMsg('kbIngestMsg',kbError(r.error)||'Import failed','err');

async function loadKbLibrary(){

  if(!el) return;
  const docs=lib.documents||[];
  if(!docs.length){
    el.innerHTML='<div class="msg info" style="margin:.5rem">No documents yet — import a file above.</div>';
    return;
  }
  el.innerHTML=docs.map(d=>
    `<div class="file-row" onclick="openSource(decodeURIComponent('${jsQuote(d.doc_id)}'),0)">
      <span>[doc] ${escapeHtml(d.name)}</span>

async function searchKnowledge(){

  if(!hits.length){
    el.innerHTML='<div class="msg info">No matches in your library.</div>';
    return;

  el.innerHTML=hits.map(h=>
    `<div class="card" style="margin:.5rem 0;cursor:pointer" onclick="openSource(decodeURIComponent('${jsQuote(h.doc_id)}'),${Number(h.chunk_index||0)})">
      <p style="margin:0;font-size:.8rem;color:var(--muted)">${escapeHtml(h.name||h.path||'')} · ${escapeHtml(h.source||'')}</p>
      <p style="margin:.35rem 0 0">${escapeHtml((h.text||'').slice(0,400))}${(h.text||'').length>400?'…':''}</p>
    </div>`).join('');

async function previewPack(path){
  const r=await api('/api/content/preview?path='+encodeURIComponent(path));
  const box=document.getElementById('contentPreview');
  if(!box) return;
  if(r.error){
    box.style.display='block';
    box.innerHTML=`<div class="msg err">${escapeHtml(r.error)}</div>`;
    return;
  }
  const m=r.manifest||{};
  const lic=(r.licences||[]).map(l=>`<details><summary>${escapeHtml(l.name)}</summary><pre style="white-space:pre-wrap;font-size:.8rem">${escapeHtml(l.text)}</pre></details>`).join('');
  const compat=r.compat||{};
  const compatLine=compat.ok
    ?'<p style="color:var(--accent)">Compatible with this device.</p>'
    :`<p class="msg err">${escapeHtml((compat.errors||[]).join('; '))}</p>`;
  box.style.display='block';
  box.innerHTML=`<h3>${escapeHtml(m.name||m.id)}</h3>
    <p>${escapeHtml(m.description||'')}</p>
    <p style="font-size:.85rem;color:var(--muted)">Type: ${escapeHtml(m.type||'')} · Size ~${Math.round((m.size_bytes||0)/(1024*1024))} MB</p>
    ${compatLine}
    ${lic}
    <div class="btn-group" style="margin-top:.75rem">
      <button class="btn" onclick="installPackPath(decodeURIComponent('${jsQuote(path)}'))">Install pack</button>
      <button class="btn secondary" onclick="document.getElementById('contentPreview').style.display='none'">Dismiss</button>
    </div>`;
}

function formatChatWhen(ts){
  if(!ts) return '';
  const d=new Date(Number(ts)*1000);
  const now=new Date();
  if(d.toDateString()===now.toDateString()){
    return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}

async function ask(){

  const sendBtn=document.getElementById('sendBtn');
  const text=(qEl&&qEl.value||'').trim();
  if(!text) return;
  if(!_chatThreadId) await createChatThread();
  const agent=(document.getElementById('agent')||{}).value||'atlas.guide';
  qEl.value='';
  _chatHistory.push({role:'user',content:text});
  renderChatLog(_chatHistory,true);
  if(sendBtn){sendBtn.disabled=true;sendBtn.textContent='Thinking…';}
  const r=await api('/api/ask',{method:'POST',body:JSON.stringify({
    prompt:text,agent,history:_chatHistory.slice(0,-1)
  })});
  if(sendBtn){sendBtn.disabled=false;sendBtn.textContent='Send';}
  const out=document.getElementById('out');
  if(out) out.textContent=JSON.stringify(r,null,2);
  const res=r.result||{};
  if(r.state==='awaiting_approval'||res.pending_approval){
    _chatHistory.push({role:'assistant',content:
      'This action needs your approval (e.g. fetching a web URL). Use Approve below, then ask again.'});
    renderChatLog(_chatHistory);
    await saveCurrentChatThread();
    refreshApprovals();
    return;
  }
  if(res.error||res.detail){
    const msg=[res.hint,res.detail,res.error].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).join(' — ')
      ||'Something went wrong.';
    _chatHistory.push({role:'assistant',content:msg,isErr:true});
    renderChatLog(_chatHistory);
    await saveCurrentChatThread();
    return;
  }
  const answer=res.answer||'(No reply — check Models page or try again.)';
  const sources=res.sources||[];
  _chatHistory.push({role:'assistant',content:answer,sources});
  renderChatLog(_chatHistory);
  await saveCurrentChatThread();

let _pullTimer=null;
let _activePullJobs=[];
let _pullRefreshPending=false;
function onModelsHash(){
  return (location.hash.replace('#/','')||'home')==='models';
}
function setPullJobs(jobs){
  _activePullJobs=(jobs||[]).slice();

function renderPullUI(){
  const box=document.getElementById('pullJobs');
  if(!box) return;
  if(!_activePullJobs.length){
    box.innerHTML='<p class="download-msg">No download in progress.</p>';
    return;
  }
  box.innerHTML=_activePullJobs.map(j=>{
    const pct=Math.max(0,Math.min(100,j.progress||0));
    const indeterminate=(j.status==='queued'||j.status==='running')&&pct===0;
    const bar=indeterminate
      ?'<div class="progress-track"><div class="progress-fill" style="width:40%;animation:pulse 1.2s ease-in-out infinite alternate"></div></div>'
      :`<div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>`;
    const cls=j.status==='failed'?'err':(j.status==='completed'?'ok':'');
    const spin=(j.status==='queued'||j.status==='running')?'<span class="spinner"></span>':'';
    return `<div class="download-row" data-job="${j.id||''}">
      <div class="label"><span>${spin}<strong>${j.tag||'model'}</strong></span>
        <span>${j.status||'?'}${pct?` · ${pct}%`:''}</span></div>
      ${bar}
      <div class="download-msg ${cls}">${j.message||''}</div>
    </div>`;
  }).join('');
  document.querySelectorAll('.dl-btn').forEach(b=>{
    const t=b.getAttribute('data-tag');
    const busy=_activePullJobs.some(j=>j.tag===t&&(j.status==='queued'||j.status==='running'));
    b.disabled=busy;
    if(busy) b.textContent='Downloading…';
  });

async function pullModel(tag,btn){

    setPullJobs([{tag,status:'failed',progress:0,message:r.error||('HTTP '+r._status)}]);
    document.querySelectorAll('.dl-btn').forEach(b=>{b.disabled=false;if(b.getAttribute('data-tag')===tag)b.textContent='Download';});
    return;
  }

async function pollPulls(immediate){
  if(_pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
  async function tick(){
    if(!onModelsHash()){
      if(_pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
      return;
    }
    const active=_activePullJobs.filter(j=>j.status==='queued'||j.status==='running');
    if(!active.length){
      if(_pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
      return;
    }
    const ids=active.map(j=>j.id).filter(Boolean);
    if(!ids.length) return;
    let anyRunning=false;
    const updated=[];
    for(const id of ids){
      const s=await api('/api/models/pull/'+id);
      if(s.error) continue;
      updated.push(s);
      if(s.status==='queued'||s.status==='running') anyRunning=true;
    }
    if(updated.length){
      // Keep completed rows visible, replace matching ids
      const byId={};
      _activePullJobs.forEach(j=>{if(j.id) byId[j.id]=j;});
      updated.forEach(s=>{byId[s.id]=s;});
      setPullJobs(Object.values(byId));
    }
    if(!anyRunning){
      if(_pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
      if(!_pullRefreshPending && onModelsHash()){
        _pullRefreshPending=true;
        setTimeout(()=>{
          _pullRefreshPending=false;
          if(onModelsHash()) renderModels();
        },800);
      }
    }
  }
  if(immediate) await tick();
  if(_activePullJobs.some(j=>j.status==='queued'||j.status==='running')){
    _pullTimer=setInterval(tick,1200);
  }
}

  }

    if(btn) btn.disabled=false;

  if(btn){btn.textContent='Download and install';btn.disabled=false;btn.onclick=downloadOnlineUpdate;}

async function downloadOnlineUpdate(){
  if(!_updateOffer) return;
  const btn=document.getElementById('btnCheckUpdate');
  const prog=document.getElementById('updateProgress');
  const fill=document.getElementById('updateProgressFill');
  const ptxt=document.getElementById('updateProgressText');
  if(btn) btn.disabled=true;
  if(prog) prog.style.display='block';
  await api('/api/updates/download',{method:'POST',body:JSON.stringify({url:_updateOffer.bundle_url,sha256:_updateOffer.bundle_sha256})});
  const poll=setInterval(async()=>{
    const s=await api('/api/updates/download-status');
    if(s.done){
      clearInterval(poll);
      if(s.error){
        if(fill) fill.style.width='0%';
        showMsg('updateMsg',s.error,'err');
        if(btn){btn.disabled=false;btn.textContent='Retry';btn.onclick=downloadOnlineUpdate;}
        return;
      }
      if(fill) fill.style.width='100%';
      if(ptxt) ptxt.textContent='Download complete — applying…';
      const ar=await api('/api/updates/apply',{method:'POST',body:JSON.stringify({path:s.path})});
      if(ar.ok||ar.success){
        showMsg('updateMsg','Updated to v'+(_updateOffer.version||'?')+'. Restart services to complete.','ok');
      } else {
        showMsg('updateMsg','Apply failed: '+(ar.error||ar.message||'unknown'),'err');
      }
      if(btn){btn.disabled=false;btn.textContent='Check for updates';btn.onclick=checkOnlineUpdate;}
      if(prog) prog.style.display='none';
    } else if(s.total>0){
      const pct=Math.round((s.downloaded/s.total)*100);
      if(fill) fill.style.width=pct+'%';
      if(ptxt) ptxt.textContent=Math.round(s.downloaded/(1024*1024))+' / '+Math.round(s.total/(1024*1024))+' MB';
    }
  },1000);
}

    <p>Atlas will take a snapshot before applying this bundle. If health checks fail afterwards, changes roll back automatically.</p>
    <div class="btn-group">
      <button class="btn" onclick="closeModal();applyUpdateConfirmed(decodeURIComponent('${jsQuote(path)}'))">Apply update</button>
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
    </div>`);
}
async function applyUpdateConfirmed(path){
  showMsg('updMsg','Applying update…','info');
  const r=await api('/api/updates/apply',{method:'POST',body:JSON.stringify({path})});
  if(r.error==='bad_response'){
    showMsg('updMsg','Update failed (empty/invalid server response). Check atlas-command-centre logs.','err');
    return;
  }
  if(r.error||r.ok===false){
    showMsg('updMsg',(r.detail||r.error||'Update failed')+(r.rolled_back?' (rolled back)':''),'err');
    return;
  }
  showMsg('updMsg','Applied '+ (r.version||r.detail),'ok');
}
async function nextStep(){
  await api('/api/setup/advance',{method:'POST',body:'{}'});
  page();
}
async function reauth(){
  const r=await api('/api/auth/reauth',{method:'POST',body:JSON.stringify({password:rp.value})});
  const el=document.getElementById('reout');
  if(!el) return;
  if(r.ok) el.innerHTML='<div class="msg ok">Password confirmed.</div>';
  else el.innerHTML='<div class="msg err">Confirmation failed.</div>';
}
async function boot(){
  closeModal();
  try{
    const ok=await ensureSession();
    if(ok) page();
  }catch(e){
    console.error(e);
    showGateError('Startup error: '+(e&&e.message?e.message:String(e)));
  }
}
window.addEventListener('hashchange',()=>{
  if(!onModelsHash() && _pullTimer){clearInterval(_pullTimer);_pullTimer=null;}
  if(authed) page();
});
boot();
</script></body></html>
