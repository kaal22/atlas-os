<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas OS</title>
  <style>
    :root {
      --bg: #000000;
      --text: #f2f2f2;
      --muted: #8a8a8a;
      --ok: #6bcf8e;
      --bad: #d66;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Source Sans 3", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,255,255,0.08), transparent 55%),
        #000;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main { max-width: 32rem; text-align: center; width: 100%; }
    img.mark {
      width: 140px;
      height: 140px;
      object-fit: contain;
      margin-bottom: 1.25rem;
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.35));
    }
    .brand {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      margin: 0 0 0.75rem;
      text-transform: uppercase;
    }
    p { color: var(--muted); line-height: 1.55; font-size: 1.05rem; }
    .status {
      margin-top: 2rem;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.03);
      text-align: left;
    }
    .status h2 {
      margin: 0 0 0.75rem;
      font-size: 0.8rem;
      color: #fff;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.95rem;
    }
    .row:first-of-type { border-top: 0; }
    .name { color: var(--text); }
    .addr { color: var(--muted); font-family: ui-monospace, monospace; font-size: 0.8rem; }
    .pill {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      min-width: 3.5rem;
      text-align: right;
    }
    .pill.ok { color: var(--ok); }
    .pill.bad { color: var(--bad); }
    .pill.wait { color: var(--muted); }
    .note { margin-top: 0.85rem; font-size: 0.85rem; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="logo.png" alt="Atlas" />
    <h1 class="brand">Atlas OS</h1>
    <p>Private offline AI and knowledge environment.</p>
    <div class="status">
      <h2>Local services</h2>
      <p class="note" id="fb" style="margin-top:0"></p>
      <div id="health"></div>
      <p class="note">Probes bind to <code>127.0.0.1</code> only. Refresh after first-boot import.</p>
    </div>
  </main>
  <script>
    const services = [
      { name: "Kiwix", url: "http://127.0.0.1:8080/" },
      { name: "Qdrant", url: "http://127.0.0.1:6333/readyz" },
      { name: "NOMAD", url: "http://127.0.0.1:8090/api/health" },
      { name: "Ollama", url: "http://127.0.0.1:11434/api/tags" },
    ];

    const root = document.getElementById("health");
    const fb = document.getElementById("fb");

    function row(svc, state) {
      const el = document.createElement("div");
      el.className = "row";
      el.innerHTML =
        `<span class="name">${svc.name}</span>` +
        `<span class="addr">${svc.url.replace("http://", "")}</span>` +
        `<span class="pill ${state}">${state}</span>`;
      return el;
    }

    function normalize(h) {
      if (Array.isArray(h)) return { firstboot: "unknown", message: "", services: h };
      if (h && typeof h === "object") return h;
      return { firstboot: "unknown", message: "", services: [] };
    }

    async function refresh() {
      root.innerHTML = "";
      const data = normalize(window.ATLAS_HEALTH);
      if (fb) {
        const msg = data.message ? ` — ${data.message}` : "";
        fb.textContent = `First-boot: ${data.firstboot || "unknown"}${msg}`;
      }
      const list = (data.services && data.services.length) ? data.services : [];
      if (list.length) {
        for (const item of list) {
          const svc = { name: item.name, url: item.url };
          root.appendChild(row(svc, item.ok ? "ok" : "bad"));
        }
        return;
      }
      for (const svc of services) {
        root.appendChild(row(svc, "wait"));
      }
    }

    refresh();
  </script>
</body>
</html>
