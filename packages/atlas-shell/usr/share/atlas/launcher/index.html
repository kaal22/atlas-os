<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas OS</title>
  <style>
    :root {
      --bg: #000000;
      --text: #f2f2f2;
      --muted: #8a8a8a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Source Sans 3", system-ui, sans-serif;
      color: var(--text);
      background: #000;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main { max-width: 28rem; text-align: center; }
    img.mark {
      width: 140px;
      height: 140px;
      object-fit: contain;
      margin-bottom: 1.25rem;
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.35));
    }
    .brand {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      margin: 0 0 0.75rem;
      text-transform: uppercase;
    }
    p { color: var(--muted); line-height: 1.55; font-size: 1.05rem; }
    .status {
      margin-top: 2rem;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.03);
      text-align: left;
    }
    .status h2 {
      margin: 0 0 0.5rem;
      font-size: 0.8rem;
      color: #fff;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    ul { margin: 0; padding-left: 1.2rem; color: var(--text); }
    code { color: #fff; }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="logo.png" alt="Atlas" />
    <h1 class="brand">Atlas OS</h1>
    <p>Private offline AI and knowledge environment.</p>
    <div class="status">
      <h2>Phase 1 placeholder</h2>
      <ul>
        <li>Launcher package installed</li>
        <li>Command Centre arrives after first-boot provisioning</li>
        <li>Expected endpoint: <code>http://127.0.0.1:8787/</code></li>
      </ul>
    </div>
  </main>
</body>
</html>
