# Atlas OS approved upstream catalogue
# Exact digests/hashes live in sources.lock.yaml after lock-refresh.
schema: atlas.sources.catalog/v1
atlas_version: "0.1.0-alpha"
updated: "2026-07-11"

project_nomad:
  upstream_release: v1.33.0
  upstream_source_archive: https://github.com/Crosstalk-Solutions/project-nomad/archive/refs/tags/v1.33.0.tar.gz
  upstream_repository: https://github.com/Crosstalk-Solutions/project-nomad
  upstream_reference_image: ghcr.io/crosstalk-solutions/project-nomad:v1.33.0
  licence: Apache-2.0
  atlas_image: ghcr.io/atlas-os/atlas-nomad-core

core_images:
  - id: mysql
    image: mysql:8.0
    purpose: NOMAD / Atlas relational store
  - id: redis
    image: redis:7-alpine
    purpose: Queues and ephemeral coordination
  - id: dozzle
    image: amir20/dozzle:v10.0
    purpose: Optional log viewer (disabled on public interfaces)
  - id: nomad_sidecar_updater
    image: ghcr.io/crosstalk-solutions/project-nomad-sidecar-updater:latest
    note: Resolve digest at lock-refresh; replace with Atlas Updater before V1
  - id: nomad_disk_collector
    image: ghcr.io/crosstalk-solutions/project-nomad-disk-collector:latest
    note: Resolve digest at lock-refresh; replace with System Daemon before V1

standard_apps:
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.8.2
    purpose: Serve ZIM knowledge archives
  qdrant:
    image: qdrant/qdrant:v1.16
    purpose: Vector database for knowledge retrieval
  kolibri:
    image: treehouses/kolibri:0.12.8
    purpose: Offline education platform
    warning: Migrate to maintained Learning Equality image before commercial release
  cyberchef:
    image: ghcr.io/gchq/cyberchef:10.24
    purpose: Local data transformation tools
  flatnotes:
    image: dullage/flatnotes:v5.5.4
    purpose: Local Markdown notes
  ollama_container_fallback:
    image: ollama/ollama:0.24.0
    purpose: NOMAD-compatible container baseline (fallback only)

ollama:
  version: "0.31.2"
  linux_amd64_archive: https://github.com/ollama/ollama/releases/download/v0.31.2/ollama-linux-amd64.tar.zst
  linux_amd64_sha256: "2c88f0f31a959bac5a3cad4cc5296ec568551d4aa79f548f554adb2b575b3133"
  install_target: /usr
  model_directory: /srv/atlas/models/ollama
  bind_address: "127.0.0.1:11434"
  cloud_disabled: true
  deployment: host-native

models:
  chat:
    ollama_tag: "qwen3:4b"
    upstream_model: Qwen/Qwen3-4B
    licence: Apache-2.0
    role: General local chat and agent tool use
  embeddings:
    ollama_tag: "nomic-embed-text:v1.5"
    upstream_model: nomic-ai/nomic-embed-text-v1.5
    licence: Apache-2.0
    role: English document embeddings

wikipedia_english:
  discovery_root: https://download.kiwix.org/zim/wikipedia/
  # Default Content Install fetch (small; suitable for online pull without confirm_large)
  starter_100_nopic:
    file: wikipedia_en_100_nopic_2026-04.zim
    size_hint: 14MB
    url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_100_nopic_2026-04.zim
    note: Default ATLAS_ZIM_URL / pack meta.zim_fetch.default_url
  starter_100_maxi:
    file: wikipedia_en_100_maxi_2026-04.zim
    size_hint: 48MB
    url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_100_maxi_2026-04.zim
  starter_100_with_media:
    file: wikipedia_en_100_2026-04.zim
    size_hint: 309MB
    url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_100_2026-04.zim
  mini:
    file: wikipedia_en_all_mini_2026-06.zim
    size_hint: 12GB
    url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_all_mini_2026-06.zim
    size_class: large
  no_pictures:
    file: wikipedia_en_all_nopic_2026-06.zim
    size_hint: 49GB
    url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_all_nopic_2026-06.zim
    size_class: large
  full_with_media:
    file: wikipedia_en_all_maxi_2026-02.zim
    size_hint: 115GB
    url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_all_maxi_2026-02.zim
    size_class: large
  iso_policy:
    core: none
    starter: curated_markdown_plus_en_100_nopic_on_install
    expanded_usb: mini
    separate_pack: no_pictures
    oem_or_external: full_with_media
  atlas_fetch: |
    Catalogue SKUs:
      atlas.knowledge.wikipedia-en       — curated Markdown + starter_100_nopic (~13 MB)
      atlas.knowledge.wikipedia-en-mini  — wikipedia_en_all_mini (size_class large, confirm_large)
      atlas.knowledge.wikipedia-en-nopic — wikipedia_en_all_nopic (size_class large, confirm_large)
      atlas.knowledge.wikipedia-en-maxi  — wikipedia_en_all_maxi (size_class large, confirm_large)
    Content Install async-downloads zim_fetch.default_url (or ATLAS_ZIM_URL) into
    /srv/atlas/knowledge/packs/wikipedia-en[-mini|-nopic|-maxi] and registers with Kiwix.
    Skip with ATLAS_ZIM_SKIP_FETCH=1. Large dumps require confirm_large / free disk.

# Offline Library ZIMs (Kiwix) beyond Wikipedia — install-time fetch only; never commit multi-GB into git.
library_zim:
  medicine_english:
    discovery_root: https://download.kiwix.org/zim/wikipedia/
    starter_mini:
      file: wikipedia_en_medicine_mini_2026-04.zim
      size_hint: 155MB
      url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_medicine_mini_2026-04.zim
      note: Default atlas.knowledge.medicine-en zim_fetch
    nopic:
      file: wikipedia_en_medicine_nopic_2026-04.zim
      size_hint: 822MB
      url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_medicine_nopic_2026-04.zim
      size_class: medium
    maxi:
      file: wikipedia_en_medicine_maxi_2026-04.zim
      size_hint: 2.1GB
      url: https://download.kiwix.org/zim/wikipedia/wikipedia_en_medicine_maxi_2026-04.zim
      size_class: large
  howto_ifixit_english:
    discovery_root: https://download.kiwix.org/zim/ifixit/
    full:
      file: ifixit_en_all_2025-12.zim
      size_hint: 3.3GB
      url: https://download.kiwix.org/zim/ifixit/ifixit_en_all_2025-12.zim
      size_class: large
      note: DIY / device repair how-to (iFixit via Kiwix)
  gutenberg_english:
    discovery_root: https://download.kiwix.org/zim/gutenberg/
    literature_slice:
      file: gutenberg_en_lcc-pn_2026-03.zim
      size_hint: 3.0GB
      url: https://download.kiwix.org/zim/gutenberg/gutenberg_en_lcc-pn_2026-03.zim
      size_class: large
      note: Project Gutenberg English literature (LCC PN) starter; full en_all is ~206 GB OEM/external
    full_all:
      file: gutenberg_en_all_2025-11.zim
      size_hint: 206GB
      url: https://download.kiwix.org/zim/gutenberg/gutenberg_en_all_2025-11.zim
      size_class: large
      note: Not a default catalogue SKU — OEM / external SSD only
  atlas_fetch: |
    Catalogue SKUs (Command Centre Library + Content):
      atlas.knowledge.medicine-en     — medicine mini (~155 MB)
      atlas.knowledge.howto-ifixit-en — iFixit EN (~3.3 GB, confirm_large)
      atlas.knowledge.gutenberg-en    — Gutenberg EN literature slice (~3 GB, confirm_large)
    Same zim_fetch / Kiwix register path as Wikipedia packs.

kolibri_channels:
  note: |
    Kolibri app image is in standard_apps / compose (127.0.0.1:8083).
    Learning channels (Khan Academy, K-12 curricula) are separate locked assets —
    not shipped in the core ISO. Alpha MVP: open Kolibri from Command Centre Education;
    import channels via Kolibri UI or future atlas.education.kolibri-* packs.
  pending:
    - khan_academy_math_science
    - k12_curriculum_channels
  atlas_education:
    kids_home: atlas.education.kids-home  # Markdown RAG for tutors (ships now)

maps:
  nomad_map_assets:
    repository: https://github.com/Crosstalk-Solutions/project-nomad-maps
  protomaps:
    project: https://protomaps.com/
    documentation: https://docs.protomaps.com/
    format: PMTiles
    downloads: https://docs.protomaps.com/basemaps/downloads
    daily_builds: https://build.protomaps.com/
    atlas_fetch: |
      Country packs use `pmtiles extract` against a daily planet URL (range requests)
      with bbox from content/packs/maps/countries.json. Default maxzoom 11.
      Override: ATLAS_PMTILES_PLANET_URL / ATLAS_PMTILES_URL / ATLAS_PMTILES_MAXZOOM.
  initial_packs:
    - atlas-maps-uk
    - atlas-maps-ireland
    - atlas-maps-western-europe
    - atlas-maps-europe

debian:
  release: trixie
  suite: stable
  arch: amd64
  snapshot_policy: pin_on_lock_refresh

iso_profiles:
  core:
    description: Appliance ISO under ~10GB without large ZIMs or models
    include_models: false
    include_zim: false
  starter:
    description: Core plus starter model pack and small curated ZIM
    include_models: true
    include_zim: curated_small
  recovery:
    description: Recovery and factory-repair media
    include_models: false
    include_zim: false
